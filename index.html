<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f8fafb; color: #1a1a1a; min-height: 100vh; }


/* BUBBLE ANİMASYON */
.bubbles-bg { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
.bubble { position: absolute; display: flex; flex-direction: column; align-items: center; gap: 6px; animation: floatUp linear infinite; pointer-events: none; opacity: 0; }
.bubble-avatar { width: 54px; height: 54px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 15px; font-weight: 700; color: rgba(255,255,255,0.9); background-size: cover; background-position: center; filter: blur(2.5px) saturate(0.5) brightness(1.1); border: 2px solid rgba(255,255,255,0.5); box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
.bubble-info { background: rgba(255,255,255,0.7); backdrop-filter: blur(8px); border: 1px solid rgba(200,210,220,0.4); border-radius: 999px; padding: 3px 10px; font-size: 10px; font-weight: 500; color: #555; white-space: nowrap; }
.bubble-score { color: #1D9E75; font-weight: 700; }
@keyframes floatUp {
  0%   { transform: translateY(108vh) translateX(0px); opacity: 0; }
  6%   { opacity: 0.55; }
  50%  { transform: translateY(50vh) translateX(12px); }
  94%  { opacity: 0.4; }
  100% { transform: translateY(-15vh) translateX(-8px); opacity: 0; }
}
.fade-top { position: fixed; top: 0; left: 0; right: 0; height: 180px; background: linear-gradient(to bottom, #f8fafb, transparent); z-index: 2; pointer-events: none; }
.fade-bottom { position: fixed; bottom: 0; left: 0; right: 0; height: 180px; background: linear-gradient(to top, #f8fafb, transparent); z-index: 2; pointer-events: none; }
.student-counter { position: fixed; top: 1.1rem; right: 1.1rem; z-index: 10; background: rgba(255,255,255,0.8); backdrop-filter: blur(8px); border-radius: 999px; padding: 5px 14px; font-size: 11px; color: #888; border: 1px solid rgba(0,0,0,0.07); }
.student-counter span { color: #1D9E75; font-weight: 700; }
/* ANA SAYFA */
.home { position: relative; z-index: 5; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem; }
.home-logo { font-size: 22px; font-weight: 700; color: #1a1a1a; margin-bottom: 0.4rem; text-align: center; }

.home-sub { font-size: 14px; color: #888; margin-bottom: 3rem; text-align: center; }
.home-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; width: 100%; max-width: 480px; }

.home-card:hover { transform: translateY(-2px); box-shadow: 0 6px 24px rgba(29,158,117,0.13); border-color: rgba(29,158,117,0.35); }

.home-card h2 { font-size: 15px; font-weight: 600; color: #1a1a1a; margin-bottom: 0.4rem; line-height: 1.3; }
.home-card p { font-size: 12px; color: #aaa; }
.contact-btns { display: flex; gap: 10px; margin-top: 2rem; }
.contact-btn { display: flex; align-items: center; gap: 8px; padding: 10px 20px; border-radius: 999px; font-size: 13px; font-weight: 600; text-decoration: none; transition: opacity 0.15s; }
.contact-btn.mail { background: #f0f4ff; color: #2952cc; }
.contact-btn.whatsapp { background: #e8f8ef; color: #128C7E; }

/* TRACKER */
.tracker { display: none; flex-direction: column; min-height: 100vh; }
.header { background: #fff; border-bottom: 1px solid #e8eaed; padding: 0.9rem 1.25rem; display: flex; align-items: center; gap: 10px; position: sticky; top: 0; z-index: 20; }
.back-btn { background: none; border: 1px solid #e8eaed; border-radius: 999px; padding: 5px 12px; font-size: 12px; color: #555; cursor: pointer; white-space: nowrap; }

/* KİLİT */
.lock-screen { background: #fff; border-radius: 16px; border: 1px solid #e8eaed; padding: 2.5rem 1.5rem; text-align: center; margin: 1.5rem; }

.lock-input { width: 100%; max-width: 260px; padding: 10px 14px; border: 1.5px solid #e8eaed; border-radius: 10px; font-size: 15px; text-align: center; outline: none; letter-spacing: 2px; margin-bottom: 12px; display: block; margin-left: auto; margin-right: auto; }

.student-info h2 { font-size: 16px; font-weight: 600; margin-bottom: 3px; }

.logout-btn { margin-left: 8px; background: none; border: 1px solid #e8eaed; border-radius: 999px; padding: 4px 10px; font-size: 11px; color: #888; cursor: pointer; white-space: nowrap; }

/* SAYFA SEKMELERİ */
.page-tabs { display: flex; gap: 0; margin-bottom: 1.25rem; background: #fff; border-radius: 12px; border: 1px solid #e8eaed; overflow: hidden; }
.page-tab { flex: 1; padding: 10px 8px; text-align: center; font-size: 13px; font-weight: 500; cursor: pointer; color: #888; border-right: 1px solid #e8eaed; transition: all 0.15s; }
.page-tab:last-child { border-right: none; }
.page-tab.active { background: #1D9E75; color: #fff; font-weight: 600; }

/* ÖZET SAYFA */
.metrics-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 1rem; }
.metric-card { background: #fff; border-radius: 12px; padding: 14px; border: 1px solid #e8eaed; }
.metric-label { font-size: 11px; color: #888; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.04em; }
.metric-value { font-size: 26px; font-weight: 700; color: #1a1a1a; line-height: 1; }

.up { color: #0F6E56; } .down { color: #c0392b; } .same { color: #888; }

.card-title { font-size: 13px; font-weight: 600; color: #333; margin-bottom: 1rem; }
.skill-row { margin-bottom: 12px; }
.skill-header { display: flex; justify-content: space-between; margin-bottom: 5px; }

.progress-fill { height: 100%; border-radius: 999px; transition: width 0.8s ease; }

/* TAKVİM */
.calendar-wrap { margin-bottom: 1rem; }
.cal-month { background: #fff; border-radius: 14px; border: 1px solid #e8eaed; overflow: hidden; margin-bottom: 10px; }
.cal-month-title { font-size: 13px; font-weight: 600; color: #333; padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; user-select: none; }
.cal-month-title:hover { background: #f8fffe; }
.cal-month-title .cal-arrow { font-size: 11px; color: #aaa; transition: transform 0.2s; }
.cal-month-title.open .cal-arrow { transform: rotate(180deg); }
.cal-month-body { display: none; }
.cal-month-body.open { display: block; }
.cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 0; }
.cal-day-name { text-align: center; font-size: 10px; color: #aaa; padding: 8px 0; font-weight: 500; }
.cal-day { text-align: center; padding: 6px 2px; font-size: 12px; min-height: 36px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: default; }
.cal-day.empty { }
.cal-day .day-num { width: 26px; height: 26px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 500; }
.cal-day.yapildi .day-num { background: #1D9E75; color: #fff; }
.cal-day.yapilmadi .day-num { background: #e74c3c; color: #fff; }
.cal-day.ertelendi .day-num { background: #f39c12; color: #fff; }

.cal-day.sonraki .day-num { background: #378ADD; color: #fff; }
.cal-legend { display: flex; gap: 16px; padding: 10px 16px; border-top: 1px solid #f0f0f0; flex-wrap: wrap; }
.cal-legend-item { display: flex; align-items: center; gap: 6px; font-size: 11px; color: #666; }
.cal-legend-dot { width: 12px; height: 12px; border-radius: 50%; }

/* HAFTALIK SEKMELER */
.week-tabs { display: flex; gap: 8px; overflow-x: auto; margin-bottom: 1rem; padding-bottom: 2px; }
.week-tab { padding: 6px 14px; border-radius: 999px; font-size: 12px; font-weight: 500; cursor: pointer; border: 1.5px solid #e8eaed; background: #fff; color: #555; white-space: nowrap; flex-shrink: 0; }
.week-tab.active { background: #1D9E75; color: #fff; border-color: #1D9E75; }
.week-card { background: #fff; border-radius: 14px; border: 1px solid #e8eaed; overflow: hidden; margin-bottom: 1rem; }
.week-card-header { padding: 14px 16px; border-bottom: 1px solid #f0f0f0; display: flex; align-items: center; justify-content: space-between; }
.week-card-title { font-size: 14px; font-weight: 600; }
.week-date { font-size: 12px; color: #888; }
.week-status { display: inline-flex; align-items: center; gap: 5px; font-size: 12px; font-weight: 600; padding: 4px 10px; border-radius: 999px; }
.week-status.yapildi { background: #E1F5EE; color: #0F6E56; }
.week-status.yapilmadi { background: #fdecea; color: #c0392b; }
.week-status.ertelendi { background: #fef8e7; color: #9a6700; }
.week-status.sonraki { background: #e8f1fb; color: #185FA5; }
.week-body { padding: 14px 16px; }
.week-row { display: flex; margin-bottom: 10px; gap: 10px; }

.week-score-item { display: flex; align-items: center; justify-content: space-between; background: #f8f9fa; border-radius: 10px; padding: 10px 14px; }

/* DENEME */

.exam-table th { color: #888; font-weight: 500; text-align: left; padding: 6px 8px; border-bottom: 1px solid #f0f0f0; font-size: 11px; text-transform: uppercase; }

.tag { display: inline-block; font-size: 10px; padding: 2px 8px; border-radius: 999px; font-weight: 600; }
.tag-green { background: #E1F5EE; color: #0F6E56; }
.tag-teal  { background: #d0f0e8; color: #0a5c45; }
.tag-amber { background: #FAEEDA; color: #854F0B; }
.tag-blue  { background: #E6F1FB; color: #185FA5; }

.content { padding: 1.25rem; max-width: 720px; margin: 0 auto; }
.empty { text-align: center; padding: 3rem 1rem; color: #aaa; font-size: 14px; }
.loading { text-align: center; padding: 3rem; color: #888; font-size: 14px; }
canvas { max-height: 200px; }
/* ROZET BİLDİRİMİ */
.badge-notif { border-radius: 14px; padding: 1rem 1.25rem; margin-bottom: 1rem; display: flex; align-items: center; gap: 14px; }
.badge-notif.gained { background: linear-gradient(135deg, #e8f8ef, #d0f0e0); border: 1px solid #a8dfc0; }
.badge-notif.lost   { background: linear-gradient(135deg, #fdecea, #fad4d1); border: 1px solid #f5b4b0; }
.badge-notif-emoji  { font-size: 36px; flex-shrink: 0; }
.badge-notif-text h3 { font-size: 14px; font-weight: 700; margin-bottom: 3px; }
.badge-notif.gained h3 { color: #0a5c38; }
.badge-notif.lost   h3 { color: #8b1a14; }
.badge-notif-text p { font-size: 12px; color: #555; line-height: 1.4; }

/* ROZETLER */
.badges-card { background: #fff; border-radius: 14px; border: 1px solid #e8eaed; padding: 1.25rem; margin-bottom: 1rem; }
.badges-title { font-size: 13px; font-weight: 600; color: #333; margin-bottom: 1rem; }
.badges-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; }
.badge-item { display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 8px 4px; border-radius: 10px; }

.badges-progress-bar { flex: 1; height: 6px; background: #f0f0f0; border-radius: 999px; overflow: hidden; }
.badges-progress-fill { height: 100%; background: linear-gradient(90deg, #f39c12, #1D9E75); border-radius: 999px; transition: width 0.8s ease; }
.badges-progress-text { font-size: 11px; color: #888; white-space: nowrap; }

</style>

<body>

<div class="fade-top"></div>
<div class="fade-bottom"></div>
<div class="bubbles-bg" id="bubblesContainer"></div>
<div class="student-counter"><span id="studentCount">0</span> aktif öğrenci</div>
<div class="home" id="home">
  <div class="home-logo">Öğrenci<span>Takip</span></div>
  <div class="home-sub">Hizmet seçin</div>
  <div class="home-cards">
    <div class="home-card" onclick="openSection('ingilizce')">
      <div class="icon">📚</div>

    <button class="back-btn" onclick="goHome()">← Geri</button>

    <div class="last-updated" id="last-updated"></div>
  </div>
  <div class="student-tabs" id="tabs"></div>
  <div class="content" id="content">
    <div class="loading">Veriler yükleniyor...</div>
  </div>
</div>

<script>
const SHEET_ID = "19kAcNuSVjbP_XODmFOj4uCQQ8JYxZ7IQSrw5KLwqKLY";
const SECTIONS = {
  ingilizce: { gid: "0",         label: "📚 İngilizce Özel Ders" },
  kocluk:    { gid: "770963286", label: "🎯 Eğitim Koçum" }
};
const DENEMELER_GID = "969516335";
const SKILL_COLORS = {
  vocabulary: "#1D9E75", konusma: "#378ADD",
  okuma: "#7F77DD", yazma: "#EF9F27", grammar: "#D85A30"
};
const SKILL_LABELS = { vocabulary:"Vocabulary", konusma:"Konuşma", okuma:"Okuma", yazma:"Yazma", grammar:"Grammar" };
const TR_MONTHS = ["Ocak","Şubat","Mart","Nisan","Mayıs","Haziran","Temmuz","Ağustos","Eylül","Ekim","Kasım","Aralık"];
const TR_DAYS   = ["Pzt","Sal","Çar","Per","Cum","Cmt","Paz"];

let currentSection = null;
let allData = [];
let students = [];
let passwords = {};
let unlockedStudents = {};
let activeStudent = null;
let activePageTab = "ozet"; // ozet | takvim | haftalar
let activeWeekIndex = 0;
let denemelerData = [];


function examTag(puan) {
  if (puan > 85) return { cls: 'tag-green',  lbl: 'Muhteşemsin!' };
  if (puan > 70) return { cls: 'tag-teal',   lbl: 'Böyle Devam' };
  if (puan > 50) return { cls: 'tag-amber',  lbl: 'Yükselişte' };
  return              { cls: 'tag-blue',   lbl: 'Gelişiyor' };
}

function parseCSV(text) {
  const lines = text.trim().split("\n");
  return lines.map(line => {
    const cols = []; let cur = "", inQ = false;
    for (let i = 0; i < line.length; i++) {
      const ch = line[i];
      if (ch === '"') { inQ = !inQ; }
      else if (ch === ',' && !inQ) { cols.push(cur.trim()); cur = ""; }
      else { cur += ch; }
    }
    cols.push(cur.trim());
    return cols;
  });
}


const BUBBLE_COLORS = ["#7aada0","#8eacc4","#a49ec4","#7fb89e","#c4a08e","#9eadb4","#b4a09e","#8eb4b0"];

function renderBubbles() {
  const container = document.getElementById("bubblesContainer");
  if (!container) return;
  container.innerHTML = "";

  // Saydaç
  const counter = document.getElementById("studentCount");
  if (counter) counter.textContent = students.length;

  // Her öğrenci için en son fotoğraf linkini bul
  const studentPhotos = {};
  const studentScores = {};
  allData.forEach(r => {
    if (r.foto) studentPhotos[r.ogrenci] = r.foto;
    if (r.genel > 0) studentScores[r.ogrenci] = r.genel;
  });

  students.forEach((name, idx) => {
    const foto  = studentPhotos[name] || null;
    const score = studentScores[name] || 0;
    const color = BUBBLE_COLORS[idx % BUBBLE_COLORS.length];
    const initials = name.split(" ").map(w=>w[0]).join("").toUpperCase().slice(0,2);
    const shortName = name.split(" ")[0];
    const count = 2 + Math.floor(Math.random() * 2);

    for (let i = 0; i < count; i++) {
      const el = document.createElement("div");
      el.className = "bubble";
      const duration = 12 + Math.random() * 10;
      const delay    = Math.random() * 16;
      const left     = 4 + Math.random() * 88;
      const scale    = 0.72 + Math.random() * 0.5;
      el.style.cssText = `left:${left}%;animation-duration:${duration}s;animation-delay:-${delay}s;transform-origin:center bottom;`;

      const avatarStyle = foto
        ? `background-image:url('${foto}');background-color:${color};`
        : `background-color:${color};`;

      el.innerHTML = `
        <div class="bubble-avatar" style="${avatarStyle}">${foto ? '' : initials}</div>
        <div class="bubble-info">${shortName} <span class="bubble-score">%${score}</span></div>
      `;
      el.style.transform = `scale(${scale})`;
      container.appendChild(el);
    }
  });
}

function openSection(section) {
  currentSection = section;
  allData = []; students = []; passwords = {}; unlockedStudents = {}; activeStudent = null;
  document.getElementById("bubblesContainer").innerHTML = "";
  document.getElementById("home").style.display = "none";
  const tracker = document.getElementById("tracker");
  tracker.style.display = "flex";
  document.getElementById("header-title").innerHTML = SECTIONS[section].label;
  document.getElementById("tabs").innerHTML = "";
  document.getElementById("content").innerHTML = '<div class="loading">Veriler yükleniyor...</div>';
  loadData();
}

function goHome() {
  document.getElementById("home").style.display = "flex";
  document.getElementById("tracker").style.display = "none";
  currentSection = null; activeStudent = null;
  renderBubbles();
}

async function loadData() {
  const gid = SECTIONS[currentSection].gid;
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&gid=${gid}&t=${Date.now()}`;
  try {
    const res = await fetch(url);
    if (!res.ok) throw new Error("HTTP " + res.status);
    const text = await res.text();
    const rows = parseCSV(text);

    function toNum(v) { return parseFloat((v||"").toString().replace(",",".")) || 0; }

    allData = rows.slice(1).map(r => ({
      tarih:        r[0] || "",
      ogrenci:      r[1] || "",
      seviye:       r[2] || "",
      genel:        toNum(r[3]),
      vocabulary:   toNum(r[4]),
      konusma:      toNum(r[5]),
      okuma:        toNum(r[6]),
      yazma:        toNum(r[7]),
      grammar:      toNum(r[8]),
      deneme:       toNum(r[9]),
      sifre:        r[10] ? r[10].trim() : "",
      foto:         r[15] ? r[15].trim() : "",
      ders_tarihi:  r[11] || "",
      ders_durumu:  r[12] ? r[12].trim().toLowerCase() : "",
      odev_durumu:  r[13] ? r[13].trim() : "",
      konu:         r[14] || ""
    })).filter(r => r.ogrenci);

    passwords = {};
    allData.forEach(r => { if (r.sifre) passwords[r.ogrenci] = r.sifre; });
    students = [...new Set(allData.map(r => r.ogrenci))];

    // Denemeler sekmesini yükle
    try {
      const dUrl = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&gid=${DENEMELER_GID}&t=${Date.now()}`;
      const dRes = await fetch(dUrl);
      const dText = await dRes.text();
      const dRows = parseCSV(dText);
      denemelerData = dRows.slice(1).map(r => ({
        tarih:       r[0] || "",
        ogrenci:     r[1] || "",
        deneme_adi:  r[2] || "",
        puan:        toNum(r[3])
      })).filter(r => r.ogrenci && r.puan > 0);
    } catch(e) { denemelerData = []; }

    document.getElementById("last-updated").textContent =
      new Date().toLocaleTimeString("tr-TR", {hour:"2-digit",minute:"2-digit"});
    renderTabs();
    if (students.length && !activeStudent) selectStudent(students[0]);
    renderBubbles();
    else if (!students.length) {
      document.getElementById("content").innerHTML = '<div class="empty">Henüz öğrenci eklenmemiş.</div>';
    }
  } catch(e) {
    console.error(e);
    document.getElementById("content").innerHTML = `<div class="empty">Hata: ${e.message}</div>`;
  }
}

function renderTabs() {
  document.getElementById("tabs").innerHTML = students.map(s =>
    `<div class="tab${s===activeStudent?' active':''}" onclick="selectStudent('${esc(s)}')">${s.split(" ")[0]}${passwords[s]?' 🔒':''}</div>`
  ).join("");
}

function esc(s) { return s.replace(/\\/g,"\\\\").replace(/'/g,"\\'"); }

function selectStudent(name) {
  activeStudent = name; activePageTab = "ozet"; activeWeekIndex = 0;
  renderTabs();
  if (passwords[name] && !unlockedStudents[name]) { showLockScreen(name); return; }
  showStudentPage(name);
}

function showLockScreen(name) {
  const s = esc(name);
  document.getElementById("content").innerHTML = `
    <div class="lock-screen">
      <div class="lock-icon">🔒</div>
      <h3>${name.split(" ")[0]} adlı öğrencinin sayfası</h3>
      <p>Bu sayfayı görüntülemek için şifre gereklidir.</p>
      <input class="lock-input" type="password" id="pwd-input" placeholder="Şifrenizi girin" onkeydown="if(event.key==='Enter')checkPassword('${s}')">
      <button class="lock-btn" onclick="checkPassword('${s}')">Giriş Yap</button>
      <div class="lock-error" id="lock-error"></div>
    </div>`;
  setTimeout(() => document.getElementById("pwd-input")?.focus(), 100);
}

function checkPassword(name) {
  const input = document.getElementById("pwd-input").value.trim();
  if (input === (passwords[name]||"").trim()) {
    unlockedStudents[name] = true; showStudentPage(name);
  } else {
    document.getElementById("lock-error").textContent = "Şifre yanlış, tekrar deneyin.";
    document.getElementById("pwd-input").value = "";
    document.getElementById("pwd-input").focus();
  }
}

function logout(name) { delete unlockedStudents[name]; showLockScreen(name); }

function showStudentPage(name) {
  const rows = allData.filter(r => r.ogrenci === name).sort((a,b) => a.tarih > b.tarih ? 1:-1);
  if (!rows.length) { document.getElementById("content").innerHTML = '<div class="empty">Veri yok.</div>'; return; }
  const latest = rows[rows.length-1];
  const initials = name.split(" ").map(w=>w[0]).join("").toUpperCase().slice(0,2);
  const s = esc(name);
  // En son fotoğraf linkini bul
  const studentFoto = allData.filter(r => r.ogrenci === name && r.foto).slice(-1)[0]?.foto || null;

  let pageContent = "";
  if (activePageTab === "ozet") pageContent = buildOzet(rows, latest);
  else if (activePageTab === "takvim") pageContent = buildTakvim(rows);
  else if (activePageTab === "haftalar") pageContent = buildHaftalar(rows);
  else if (activePageTab === "denemeler") pageContent = buildDenemeler(name);

  document.getElementById("content").innerHTML = `
    <div class="student-header">
      <div class="avatar" style="${studentFoto ? `background-image:url('${studentFoto}');background-size:cover;background-position:center;` : ``}">${studentFoto ? '' : initials}</div>
      <div class="student-info"><h2>${name}</h2><p>Son güncelleme: ${latest.tarih}</p></div>
      <div class="level-badge">${latest.seviye}</div>
      ${passwords[name] ? `<button class="logout-btn" onclick="logout('${s}')">🔒 Çıkış</button>` : ""}
    </div>
    <div class="page-tabs">
      <div class="page-tab${activePageTab==='ozet'?' active':''}" onclick="switchPageTab('${s}','ozet')">📊 Özet</div>
      <div class="page-tab${activePageTab==='takvim'?' active':''}" onclick="switchPageTab('${s}','takvim')">📅 Takvim</div>
      <div class="page-tab${activePageTab==='haftalar'?' active':''}" onclick="switchPageTab('${s}','haftalar')">📝 Haftalar</div>
      <div class="page-tab${activePageTab==='denemeler'?' active':''}" onclick="switchPageTab('${s}','denemeler')">📝 Denemeler</div>
    </div>
    ${pageContent}
  `;

  if (activePageTab === "ozet") drawCharts(rows);
  if (activePageTab === "denemeler") drawDenemeChart(name);
}

function switchPageTab(name, tab) {
  activePageTab = tab;
  showStudentPage(name);
}


/* ── ROZETLER ── */
const BADGES = [
  { score:5,  emoji:"🌱", label:"Tohum Attı" },
  { score:10, emoji:"🐣", label:"Kabuğu Kırdı" },
  { score:15, emoji:"🔦", label:"Işığı Gördü" },
  { score:20, emoji:"🧩", label:"Parçaları Buldu" },
  { score:25, emoji:"🎒", label:"Yola Çıktı" },
  { score:30, emoji:"🧭", label:"Yönünü Buldu" },
  { score:35, emoji:"⚙️", label:"Motoru Çalıştı" },
  { score:40, emoji:"🌊", label:"Dalgayı Aştı" },
  { score:45, emoji:"🦋", label:"Kanat Çırptı" },
  { score:50, emoji:"🏕️", label:"Yarı Yolda" },
  { score:55, emoji:"🔭", label:"Ufku Gördü" },
  { score:60, emoji:"⚡", label:"Voltaj Yükseldi" },
  { score:65, emoji:"🦅", label:"Süzülüyor" },
  { score:70, emoji:"🌋", label:"Zirveye Yakın" },
  { score:75, emoji:"🛸", label:"Atmosfer Dışı" },
  { score:80, emoji:"💫", label:"Yörüngede" },
  { score:85, emoji:"🌠", label:"Kayan Yıldız" },
  { score:90, emoji:"🌌", label:"Galaksiye Ulaştı" },
  { score:95, emoji:"🔱", label:"Efsaneler Kulübü" },
  { score:100,emoji:"🎓", label:"Dili Fethetti" }
];

function buildBadges(genel, prevGenel) {
  const earned = BADGES.filter(b => genel >= b.score);
  const earnedCount = earned.length;
  const total = BADGES.length;
  const pct = Math.round(earnedCount / total * 100);

  // Önceki haftayla rozet karşılaştırması
  let notifHtml = "";
  if (prevGenel !== null && prevGenel !== undefined) {
    const prevEarned = BADGES.filter(b => prevGenel >= b.score);
    // Yeni kazanılan rozetler
    const newBadges = BADGES.filter(b => genel >= b.score && prevGenel < b.score);
    // Kaybedilen rozetler (puan düşmüşse)
    const lostBadges = BADGES.filter(b => genel < b.score && prevGenel >= b.score);

    if (newBadges.length > 0) {
      const names = newBadges.map(b => `${b.emoji} ${b.label}`).join(", ");
      notifHtml = `
        <div class="badge-notif gained">
          <div class="badge-notif-emoji">${newBadges[newBadges.length-1].emoji}</div>
          <div class="badge-notif-text">
            <h3>🎉 Yeni rozet kazandın!</h3>
            <p>Bu hafta harika bir performans! <strong>${names}</strong> rozeti ${newBadges.length > 1 ? 'rozetleri' : 'rozeti'} senin oldu. Böyle devam et!</p>
          </div>
        </div>`;
    } else if (lostBadges.length > 0) {
      const names = lostBadges.map(b => `${b.emoji} ${b.label}`).join(", ");
      notifHtml = `
        <div class="badge-notif lost">
          <div class="badge-notif-emoji">😔</div>
          <div class="badge-notif-text">
            <h3>Bu hafta biraz düşüş yaşandı</h3>
            <p>Maalesef <strong>${names}</strong> rozeti ${lostBadges.length > 1 ? 'rozetleri' : 'rozeti'} bu hafta elden gitti. Ama endişelenme, bir sonraki haftada geri alabilirsin!</p>
          </div>
        </div>`;
    }
  }

  const grid = BADGES.map(b => {
    const isEarned = genel >= b.score;
    return `
      <div class="badge-item ${isEarned ? 'earned' : 'locked'}">
        <div class="badge-emoji">${b.emoji}</div>
        <div class="badge-label">${b.label}</div>
        <div class="badge-score">${b.score} puan</div>
      </div>`;
  }).join("");

  return `
    ${notifHtml}
    <div class="badges-card">
      <div class="badges-title">🏅 Kazanılan Rozetler — ${earnedCount}/${total}</div>
      <div class="badges-grid">${grid}</div>
      <div class="badges-progress">
        <div class="badges-progress-bar"><div class="badges-progress-fill" style="width:${pct}%"></div></div>
        <div class="badges-progress-text">%${pct} tamamlandı</div>
      </div>
    </div>`;
}

/* ── ÖZET ── */
function buildOzet(rows, latest) {
  // Puan içeren satırları bul (genel > 0 veya herhangi bir beceri puanı > 0)
  const scoredRows = rows.filter(r => r.genel > 0 || r.vocabulary > 0 || r.konusma > 0 || r.okuma > 0 || r.yazma > 0 || r.grammar > 0);
  const latestScored = scoredRows.length > 0 ? scoredRows[scoredRows.length-1] : latest;
  const prevScored   = scoredRows.length > 1 ? scoredRows[scoredRows.length-2] : null;
  // Özet için puanlı satırı kullan
  latest = latestScored;
  const prev = prevScored;
  function delta(key) {
    if (!prev) return '<span class="same">—</span>';
    const d = latest[key]-prev[key];
    if (d>0) return `<span class="up">↑ ${d}</span>`;
    if (d<0) return `<span class="down">↓ ${Math.abs(d)}</span>`;
    return '<span class="same">→ sabit</span>';
  }
  const skills = ["vocabulary","konusma","okuma","yazma","grammar"];
  const skillRows = skills.map(sk => `
    <div class="skill-row">
      <div class="skill-header">
        <span class="skill-name">${SKILL_LABELS[sk]}</span>
        <span class="skill-score" style="color:${SKILL_COLORS[sk]}">${latest[sk]}/100</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" style="width:${latest[sk]}%;background:${SKILL_COLORS[sk]}"></div></div>
    </div>`).join("");

  // Devamsızlık özeti
  const dersler = rows.filter(r=>r.ders_durumu);
  const yapildi = dersler.filter(r=>r.ders_durumu==="yapildi").length;
  const yapilmadi = dersler.filter(r=>r.ders_durumu==="yapilmadi").length;
  const ertelendi = dersler.filter(r=>r.ders_durumu==="ertelendi").length;

  const badgesHtml = buildBadges(latest.genel, prev ? prev.genel : null);

  return `
    ${badgesHtml}
    <div class="metrics-grid">
      <div class="metric-card"><div class="metric-label">Genel puan</div><div class="metric-value">${latest.genel}</div><div class="metric-delta">${delta("genel")}</div></div>
      <div class="metric-card"><div class="metric-label">Son deneme</div><div class="metric-value" id="son-deneme-val">—</div><div class="metric-delta" id="son-deneme-delta"></div></div>
      <div class="metric-card"><div class="metric-label">Toplam ders</div><div class="metric-value">${yapildi}</div><div class="metric-delta" style="color:#888">${dersler.length} planlı</div></div>
      <div class="metric-card"><div class="metric-label">Devam oranı</div><div class="metric-value">${dersler.length?Math.round(yapildi/dersler.length*100):0}%</div><div class="metric-delta"><span style="color:#e74c3c">${yapilmadi} kaçırıldı</span></div></div>
    </div>

    <div class="card">
      <div class="card-title">Genel gelişim grafiği</div>
      <canvas id="chartGenel"></canvas>
    </div>

    <div class="card">
      <div class="card-title">Beceri radar grafiği</div>
      <canvas id="chartRadar"></canvas>
    </div>

    <div class="card">
      <div class="card-title">Beceri alanları</div>
      ${skillRows}
    </div>

  `;
}

function drawCharts(rows) {
  // Sadece puan içeren satırları al
  const scoredRows = rows.filter(r => r.genel > 0 || r.vocabulary > 0 || r.konusma > 0 || r.okuma > 0 || r.yazma > 0 || r.grammar > 0);
  const latest = scoredRows.length > 0 ? scoredRows[scoredRows.length-1] : null;

  // Varolan chart instance'larını temizle
  Object.keys(Chart.instances || {}).forEach(key => {
    try { Chart.instances[key].destroy(); } catch(e) {}
  });
  // Chart.js 4.x için
  if (Chart.getChart) {
    ["chartGenel","chartRadar"].forEach(id => {
      const existing = Chart.getChart(id);
      if (existing) existing.destroy();
    });
  }

  // Genel gelişim çizgi grafiği — tüm puanlı satırlar
  const ctx1 = document.getElementById("chartGenel");
  if (ctx1 && scoredRows.length > 0) {
    new Chart(ctx1.getContext("2d"), {
      type: "line",
      data: {
        labels: scoredRows.map(r => r.tarih),
        datasets: [
          {
            label: "Genel",
            data: scoredRows.map(r => r.genel),
            borderColor: "#1D9E75",
            backgroundColor: "rgba(29,158,117,0.08)",
            tension: 0.3, pointRadius: 4, fill: true
          },
          {
            label: "Deneme",
            data: scoredRows.map(r => r.deneme > 0 ? r.deneme : null),
            borderColor: "#378ADD",
            backgroundColor: "transparent",
            tension: 0.3, pointRadius: 4, borderDash: [5,3],
            spanGaps: false
          }
        ]
      },
      options: {
        responsive: true,
        plugins: { legend: { labels: { font: { size: 11 }, boxWidth: 10 } } },
        scales: {
          y: { min: 0, max: 100, grid: { color: "#f0f0f0" }, ticks: { font: { size: 10 } } },
          x: { grid: { display: false }, ticks: { font: { size: 10 }, maxRotation: 45 } }
        }
      }
    });
  }

  // Radar grafiği — son puanlı satır
  const ctx2 = document.getElementById("chartRadar");
  if (ctx2 && latest) {
    new Chart(ctx2.getContext("2d"), {
      type: "radar",
      data: {
        labels: ["Vocabulary","Konuşma","Okuma","Yazma","Grammar"],
        datasets: [{
          label: "Beceriler",
          data: [latest.vocabulary, latest.konusma, latest.okuma, latest.yazma, latest.grammar],
          borderColor: "#1D9E75",
          backgroundColor: "rgba(29,158,117,0.15)",
          pointBackgroundColor: "#1D9E75",
          pointRadius: 4
        }]
      },
      options: {
        responsive: true,
        scales: { r: { min: 0, max: 100, ticks: { stepSize: 25, font: { size: 10 } }, grid: { color: "#f0f0f0" }, pointLabels: { font: { size: 11 } } } },
        plugins: { legend: { display: false } }
      }
    });
  }
}

/* ── TAKVİM ── */
function buildTakvim(rows) {
  // Ders tarihlerini topla
  const dersMap = {};
  rows.forEach(r => {
    if (r.ders_tarihi) dersMap[r.ders_tarihi] = r.ders_durumu;
  });

  // Hangi aylar var?
  const allDates = Object.keys(dersMap).sort();
  if (!allDates.length) return '<div class="empty">Henüz ders tarihi girilmemiş.</div>';

  const today = new Date();
  const todayStr = today.toISOString().split("T")[0];

  // Ay aralığını bul
  const firstDate = new Date(allDates[0]);
  const lastDate  = new Date(allDates[allDates.length-1]);
  // Bugünü de ekle
  if (today > lastDate) lastDate.setTime(today.getTime());

  let months = [];
  let cur = new Date(firstDate.getFullYear(), firstDate.getMonth(), 1);
  const end = new Date(lastDate.getFullYear(), lastDate.getMonth(), 1);
  while (cur <= end) {
    months.push(new Date(cur));
    cur.setMonth(cur.getMonth()+1);
  }

  let html = '<div class="calendar-wrap">';

  months.forEach(monthDate => {
    const y = monthDate.getFullYear();
    const m = monthDate.getMonth();
    const daysInMonth = new Date(y, m+1, 0).getDate();
    // Haftanın ilk günü (Pazartesi=0)
    let firstDow = new Date(y, m, 1).getDay(); // 0=Paz
    firstDow = firstDow === 0 ? 6 : firstDow-1; // Pzt bazlı

    const isCurrentMonth = (y === today.getFullYear() && m === today.getMonth());
    const openClass = isCurrentMonth ? 'open' : '';
    html += `<div class="cal-month">
      <div class="cal-month-title ${openClass}" onclick="toggleCalMonth(this)">
        <span>${TR_MONTHS[m]} ${y}</span>
        <span class="cal-arrow">▼</span>
      </div>
      <div class="cal-month-body ${openClass}">
      <div class="cal-grid">
        ${TR_DAYS.map(d=>`<div class="cal-day-name">${d}</div>`).join("")}
        ${Array(firstDow).fill('<div class="cal-day empty"></div>').join("")}`;

    for (let d = 1; d <= daysInMonth; d++) {
      const dateStr = `${y}-${String(m+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
      const durum = dersMap[dateStr] || "";
      const isToday = dateStr === todayStr;
      let cls = "cal-day";
      if (durum) cls += " " + durum;
      else if (isToday) cls += " today";
      html += `<div class="${cls}"><div class="day-num">${d}</div></div>`;
    }
    html += `</div>
      <div class="cal-legend">
        <div class="cal-legend-item"><div class="cal-legend-dot" style="background:#1D9E75"></div>Yapıldı</div>
        <div class="cal-legend-item"><div class="cal-legend-dot" style="background:#e74c3c"></div>Yapılmadı</div>
        <div class="cal-legend-item"><div class="cal-legend-dot" style="background:#f39c12"></div>Ertelendi</div>
        <div class="cal-legend-item"><div class="cal-legend-dot" style="background:#378ADD"></div>Sonraki ders</div>
      </div>
      </div>
    </div>`;
  });

  html += '</div>';
  return html;
}

/* ── HAFTALAR ── */
function buildHaftalar(rows) {
  const dersRows = rows.filter(r => r.ders_tarihi).sort((a,b) => a.ders_tarihi > b.ders_tarihi ? 1:-1);
  if (!dersRows.length) return '<div class="empty">Henüz ders kaydı girilmemiş.</div>';

  // Haftalara grupla (takvim haftası: Pzt-Paz)
  const weekMap = {};
  dersRows.forEach(r => {
    const d = new Date(r.ders_tarihi);
    const dow = d.getDay() === 0 ? 6 : d.getDay()-1;
    const monday = new Date(d); monday.setDate(d.getDate()-dow);
    const key = monday.toISOString().split("T")[0];
    if (!weekMap[key]) weekMap[key] = [];
    weekMap[key].push(r);
  });

  const weekKeys = Object.keys(weekMap).sort();
  if (activeWeekIndex >= weekKeys.length) activeWeekIndex = weekKeys.length-1;

  const weekTabsHtml = weekKeys.map((k,i) => {
    const d = new Date(k);
    const label = `${i+1}. Hafta`;
    return `<div class="week-tab${i===activeWeekIndex?' active':''}" onclick="switchWeek(${i})">${label}</div>`;
  }).join("");

  const weekKey = weekKeys[activeWeekIndex];
  const weekRows = weekMap[weekKey];
  const weekStart = new Date(weekKey);
  const weekEnd = new Date(weekKey); weekEnd.setDate(weekEnd.getDate()+6);
  const fmt = d => `${d.getDate()} ${TR_MONTHS[d.getMonth()]}`;

  let weekCardsHtml = weekRows.map(r => {
    const durum = r.ders_durumu;
    const durumLabel = durum==="yapildi"?"✅ Yapıldı":durum==="yapilmadi"?"❌ Yapılmadı":durum==="ertelendi"?"⏳ Ertelendi":durum==="sonraki"?"📌 Sonraki Ders":"—";
    const durumCls = durum||"";
    return `
      <div class="week-card">
        <div class="week-card-header">
          <div>
            <div class="week-card-title">${r.ders_tarihi}</div>
            <div class="week-date">${r.konu || "Konu belirtilmemiş"}</div>
          </div>
          <span class="week-status ${durumCls}">${durumLabel}</span>
        </div>
        <div class="week-body">
          ${r.odev_durumu ? `<div class="week-row"><div class="week-row-label">Ödev</div><div class="week-row-value">${r.odev_durumu}</div></div>` : ""}
          ${r.genel ? `<div class="week-scores">
            <div class="week-score-item"><div class="week-score-label">Genel</div><div class="week-score-val">${r.genel}</div></div>
            <div class="week-score-item"><div class="week-score-label">Vocabulary</div><div class="week-score-val">${r.vocabulary}</div></div>
            <div class="week-score-item"><div class="week-score-label">Grammar</div><div class="week-score-val">${r.grammar}</div></div>
            <div class="week-score-item"><div class="week-score-label">Konuşma</div><div class="week-score-val">${r.konusma}</div></div>
            <div class="week-score-item"><div class="week-score-label">Okuma</div><div class="week-score-val">${r.okuma}</div></div>
            <div class="week-score-item"><div class="week-score-label">Yazma</div><div class="week-score-val">${r.yazma}</div></div>
          </div>` : ""}
        </div>
      </div>`;
  }).join("");

  return `
    <div class="week-tabs">${weekTabsHtml}</div>
    <div style="font-size:12px;color:#888;margin-bottom:12px">${fmt(weekStart)} – ${fmt(weekEnd)}</div>
    ${weekCardsHtml}
  `;
}


/* ── DENEMELER ── */
function buildDenemeler(name) {
  const rows = denemelerData.filter(r => r.ogrenci === name).sort((a,b) => a.tarih > b.tarih ? 1:-1);
  if (!rows.length) return '<div class="empty">Henüz deneme sonucu girilmemiş.</div>';

  const tableRows = rows.slice().reverse().map(r => {
    const et = examTag(r.puan);
    return `<tr><td>${r.tarih}</td><td>${r.deneme_adi||"—"}</td><td><strong>${r.puan}</strong></td><td><span class="tag ${et.cls}">${et.lbl}</span></td></tr>`;
  }).join("");

  const avg = Math.round(rows.reduce((s,r)=>s+r.puan,0)/rows.length);
  const best = Math.max(...rows.map(r=>r.puan));
  const last = rows[rows.length-1].puan;

  return `
    <div class="metrics-grid" style="grid-template-columns:repeat(3,1fr)">
      <div class="metric-card"><div class="metric-label">Son puan</div><div class="metric-value">${last}</div></div>
      <div class="metric-card"><div class="metric-label">En yüksek</div><div class="metric-value" style="color:#1D9E75">${best}</div></div>
      <div class="metric-card"><div class="metric-label">Ortalama</div><div class="metric-value">${avg}</div></div>
    </div>
    <div class="card">
      <div class="card-title">Deneme gelişim grafiği</div>
      <canvas id="chartDeneme"></canvas>
    </div>
    <div class="card">
      <div class="card-title">Tüm denemeler</div>
      <table class="exam-table">
        <thead><tr><th>Tarih</th><th>Sınav</th><th>Puan</th><th>Durum</th></tr></thead>
        <tbody>${tableRows}</tbody>
      </table>
    </div>`;
}

function drawDenemeChart(name) {
  const rows = denemelerData.filter(r => r.ogrenci === name).sort((a,b) => a.tarih > b.tarih ? 1:-1);
  const ctx = document.getElementById("chartDeneme");
  if (!ctx || !rows.length) return;
  if (Chart.getChart) { const ex = Chart.getChart("chartDeneme"); if (ex) ex.destroy(); }
  new Chart(ctx.getContext("2d"), {
    type: "line",
    data: {
      labels: rows.map(r => r.tarih),
      datasets: [{
        label: "Deneme puanı",
        data: rows.map(r => r.puan),
        borderColor: "#378ADD",
        backgroundColor: "rgba(55,138,221,0.08)",
        tension: 0.3, pointRadius: 5, fill: true,
        pointBackgroundColor: rows.map(r => r.puan>85?"#1D9E75":r.puan>70?"#0a5c45":r.puan>50?"#f39c12":"#185FA5")
      }]
    },
    options: {
      responsive: true,
      plugins: {
        legend: { display: false },
        tooltip: { callbacks: { label: ctx => ` ${ctx.raw} puan` } }
      },
      scales: {
        y: { min: 0, max: 100, grid: { color: "#f0f0f0" }, ticks: { font: { size: 10 } } },
        x: { grid: { display: false }, ticks: { font: { size: 10 }, maxRotation: 45 } }
      }
    }
  });
}


function toggleCalMonth(el) {
  el.classList.toggle('open');
  el.nextElementSibling.classList.toggle('open');
}

function switchWeek(index) {
  activeWeekIndex = index;
  showStudentPage(activeStudent);
  // Scroll to top of content
  document.getElementById("content").scrollIntoView({behavior:"smooth"});
}

loadData();
setInterval(loadData, 5*60*1000);
</script>
