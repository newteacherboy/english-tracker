.home-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; width: 100%; max-width: 480px; }
.home-card { background: #fff; border: 1px solid #e8eaed; border-radius: 18px; padding: 2rem 1.5rem; text-align: center; cursor: pointer; transition: all 0.18s; }
.home-card:hover { border-color: #1D9E75; box-shadow: 0 4px 20px rgba(29,158,117,0.12); transform: translateY(-2px); }
.home-card .icon { font-size: 36px; margin-bottom: 0.8rem; }

.contact-btns { display: flex; gap: 10px; margin-top: 2rem; }
.contact-btn { display: flex; align-items: center; gap: 8px; padding: 10px 20px; border-radius: 999px; font-size: 13px; font-weight: 600; text-decoration: none; transition: opacity 0.15s; }
.contact-btn.mail { background: #f0f4ff; color: #2952cc; }
.contact-btn.whatsapp { background: #e8f8ef; color: #128C7E; }

.header { background: #fff; border-bottom: 1px solid #e8eaed; padding: 0.9rem 1.25rem; display: flex; align-items: center; gap: 10px; position: sticky; top: 0; z-index: 20; }
.back-btn { background: none; border: 1px solid #e8eaed; border-radius: 999px; padding: 5px 12px; font-size: 12px; color: #555; cursor: pointer; white-space: nowrap; }

.header-title { font-size: 15px; font-weight: 600; flex: 1; }

.tab { padding: 7px 16px; border-radius: 999px; font-size: 13px; font-weight: 500; cursor: pointer; border: 1.5px solid #e8eaed; background: #f4f6f8; color: #555; white-space: nowrap; transition: all 0.15s; }

.lock-input:focus { border-color: #1D9E75; }
.lock-btn { background: #1D9E75; color: #fff; border: none; border-radius: 10px; padding: 10px 32px; font-size: 14px; font-weight: 600; cursor: pointer; width: 100%; max-width: 260px; }

.student-info p { font-size: 13px; color: #666; }

.logout-btn { margin-left: 8px; background: none; border: 1px solid #e8eaed; border-radius: 999px; padding: 4px 10px; font-size: 11px; color: #888; cursor: pointer; white-space: nowrap; }

.page-tab.active { background: #1D9E75; color: #fff; font-weight: 600; }

.metric-delta { font-size: 12px; margin-top: 4px; }

.skill-name { font-size: 13px; color: #555; }
.skill-score { font-size: 13px; font-weight: 600; }
.progress-bar { height: 8px; background: #f0f0f0; border-radius: 999px; overflow: hidden; }
.progress-fill { height: 100%; border-radius: 999px; transition: width 0.8s ease; }

.cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 0; }

.cal-day.yapilmadi .day-num { background: #e74c3c; color: #fff; }
.cal-day.ertelendi .day-num { background: #f39c12; color: #fff; }

.cal-day.sonraki .day-num { background: #378ADD; color: #fff; }
.cal-legend { display: flex; gap: 16px; padding: 10px 16px; border-top: 1px solid #f0f0f0; flex-wrap: wrap; }
.cal-legend-item { display: flex; align-items: center; gap: 6px; font-size: 11px; color: #666; }

.week-date { font-size: 12px; color: #888; }

.week-status.yapilmadi { background: #fdecea; color: #c0392b; }

.week-status.sonraki { background: #e8f1fb; color: #185FA5; }

.week-row { display: flex; margin-bottom: 10px; gap: 10px; }

.tag-amber { background: #FAEEDA; color: #854F0B; }

canvas { max-height: 200px; }

/* ROZET BİLDİRİMİ */

.badge-notif.lost h3 { color: #8b1a14; }
.badge-notif-text p { font-size: 12px; color: #555; line-height: 1.4; }

.badge-label { font-size: 9px; font-weight: 600; color: #555; text-align: center; }
.badge-score { font-size: 9px; color: #aaa; }
.badges-progress { margin-top: 12px; display: flex; align-items: center; gap: 10px; }
.badges-progress-bar { flex: 1; height: 6px; background: #f0f0f0; border-radius: 999px; overflow: hidden; }
.badges-progress-fill { height: 100%; background: linear-gradient(90deg, #f39c12, #1D9E75); border-radius: 999px; transition: width 0.8s ease; }
.badges-progress-text { font-size: 11px; color: #888; white-space: nowrap; }

/* 🌟 DİKKAT ÇEKEN ANİMASYONLU ÖĞRETMEN DEĞERLENDİRME KARTI 🌟 */
.teacher-feedback-card {
  position: relative;
  background: #fff;
  border-radius: 16px;
  padding: 1.5rem;
  margin-bottom: 1.5rem;
  overflow: hidden;
  border: 1px solid #e2e8f0;

  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; height: 5px;
  background: linear-gradient(90deg, #1D9E75, #378ADD, #f39c12, #1D9E75);
  background-size: 300% 100%;
  animation: borderGlow 6s linear infinite;
}
.feedback-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 12px;
}
.feedback-title {
  font-size: 14px;
  font-weight: 700;
  color: #0f172a;
  letter-spacing: 0.02em;
}
.feedback-text {
  font-size: 13.5px;
  line-height: 1.6;
  color: #334155;
  font-style: italic;
  position: relative;
  z-index: 2;
  padding-left: 5px;
}
.feedback-animated-icon {
  font-size: 18px;
  animation: writeAnimation 1.5s ease-in-out infinite alternate;
  display: inline-block;
}
@keyframes borderGlow {
  0% { background-position: 0% 50%; }
  100% { background-position: 100% 50%; }
}
@keyframes writeAnimation {
  0% { transform: translate(0, 0) rotate(0deg); }
  100% { transform: translate(3px, -3px) rotate(15deg); }
}
</style>

    " Gelecek hafta daha keskin bir odaklanma ile bu puanları ikiye katlayabiliriz.",
    " Kendine güven, potansiyelini sahaya yansıtma sırası sende!"
  ];

  // Rastgele eleman seçici fonksiyon
  const r = (arr) => arr[Math.floor(Math.random() * arr.length)];

  // Puan aralıklarına göre mektubu inşa etme
  let yorum = "";
  if (puan >= 85) {
    yorum = r(girisHarika) + r(baglacDinamik) + (odev.includes("yapılmadı") || odev.includes("yok") ? r(odevOlumsuz) : r(odevOlumlu)) + r(sonucHarika);
  } else if (puan >= 70) {
    yorum = r(girisIyi) + r(baglacDinamik) + (odev.includes("yapılmadı") || odev.includes("yok") ? r(odevOlumsuz) : r(odevOlumlu)) + r(sonucIyi);
  } else if (puan >= 50) {
    yorum = r(girisOrta) + r(baglacDinamik) + (odev.includes("yapılmadı") || odev.includes("yok") ? r(odevOlumsuz) : r(odevOlumlu)) + r(sonucGelistirilebilir);
  } else {
    yorum = r(girisDusuk) + r(baglacDinamik) + (odev.includes("yapılmadı") || odev.includes("yok") ? r(odevOlumsuz) : r(odevOlumlu)) + r(sonucGelistirilebilir);
  }
  return yorum;
}

function examTag(puan) {
  if (puan > 85) return { cls: 'tag-green',  lbl: 'Muhteşemsin!' };
  if (puan > 70) return { cls: 'tag-teal',   lbl: 'Böyle Devam' };
  if (puan > 50) return { cls: 'tag-amber',  lbl: 'Yükselişte' };
  return              { cls: 'tag-blue',   lbl: 'Gelişiyor' };
}

function parseCSV(text) {
  const lines = text.trim().split("\n");
  return lines.map(line => {
    const cols = []; let cur = "", inQ = false;
    for (let i = 0; i < line.length; i++) {
      const ch = line[i];
      if (ch === '"') { inQ = !inQ; }
      else if (ch === ',' && !inQ) { cols.push(cur.trim()); cur = ""; }
      else { cur += ch; }
    }
    cols.push(cur.trim());
    return cols;
  });
}

function openSection(section) {
  currentSection = section;
  allData = []; students = []; passwords = {}; unlockedStudents = {}; activeStudent = null;
  document.getElementById("home").style.display = "none";

}

function goHome() {
  document.getElementById("home").style.display = "flex";
  document.getElementById("tracker").style.display = "none";

}

async function loadData() {
  const gid = SECTIONS[currentSection].gid;
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&gid=${gid}&t=${Date.now()}`;
  try {
    const res = await fetch(url);
    if (!res.ok) throw new Error("HTTP " + res.status);
    const text = await res.text();
    const rows = parseCSV(text);

    function toNum(v) { return parseFloat((v||"").toString().replace(",",".")) || 0; }

    allData = rows.slice(1).map(r => ({
      tarih:        r[0] || "",
      ogrenci:      r[1] || "",
      seviye:       r[2] || "",
      genel:        toNum(r[3]),
      vocabulary:   toNum(r[4]),
      konusma:      toNum(r[5]),
      okuma:        toNum(r[6]),
      yazma:        toNum(r[7]),
      grammar:      toNum(r[8]),
      deneme:       toNum(r[9]),
      sifre:        r[10] ? r[10].trim() : "",
      ders_tarihi:  r[11] || "",
      ders_durumu:  r[12] ? r[12].trim().toLowerCase() : "",
      odev_durumu:  r[13] ? r[13].trim() : "",
      konu:         r[14] || ""
    })).filter(r => r.ogrenci);

    passwords = {};
    allData.forEach(r => { if (r.sifre) passwords[r.ogrenci] = r.sifre; });
    students = [...new Set(allData.map(r => r.ogrenci))];

    try {
      const dUrl = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&gid=${DENEMELER_GID}&t=${Date.now()}`;
      const dRes = await fetch(dUrl);
      const dText = await dRes.text();
      const dRows = parseCSV(dText);
      denemelerData = dRows.slice(1).map(r => ({
        tarih:       r[0] || "",
        ogrenci:     r[1] || "",
        deneme_adi:  r[2] || "",
        puan:        toNum(r[3])
      })).filter(r => r.ogrenci && r.puan > 0);
    } catch(e) { denemelerData = []; }

    document.getElementById("last-updated").textContent =
      new Date().toLocaleTimeString("tr-TR", {hour:"2-digit",minute:"2-digit"});
    renderTabs();
    if (students.length && !activeStudent) selectStudent(students[0]);
    else if (!students.length) {
      document.getElementById("content").innerHTML = '<div class="empty">Henüz öğrenci eklenmemiş.</div>';
    }
  } catch(e) {
    console.error(e);
    document.getElementById("content").innerHTML = `<div class="empty">Hata: ${e.message}</div>`;
  }
}

function renderTabs() {
  document.getElementById("tabs").innerHTML = students.map(s =>
    `<div class="tab${s===activeStudent?' active':''}" onclick="selectStudent('${esc(s)}')">${s.split(" ")[0]}${passwords[s]?' 🔒':''}</div>`
  ).join("");
}

function esc(s) { return s.replace(/\\/g,"\\\\").replace(/'/g,"\\'"); }

function selectStudent(name) {
  activeStudent = name; activePageTab = "ozet"; activeWeekIndex = 0;
  renderTabs();
  if (passwords[name] && !unlockedStudents[name]) { showLockScreen(name); return; }
  showStudentPage(name);
}

function showLockScreen(name) {
  const s = esc(name);
  document.getElementById("content").innerHTML = `
    <div class="lock-screen">
      <div class="lock-icon">🔒</div>
      <h3>${name.split(" ")[0]} adlı öğrencinin sayfası</h3>
      <p>Bu sayfayı görüntülemek için şifre gereklidir.</p>
      <input class="lock-input" type="password" id="pwd-input" placeholder="Şifrenizi girin" onkeydown="if(event.key==='Enter')checkPassword('${s}')">
      <button class="lock-btn" onclick="checkPassword('${s}')">Giriş Yap</button>
      <div class="lock-error" id="lock-error"></div>
    </div>`;
  setTimeout(() => document.getElementById("pwd-input")?.focus(), 100);
}

function checkPassword(name) {
  const input = document.getElementById("pwd-input").value.trim();
  if (input === (passwords[name]||"").trim()) {
    unlockedStudents[name] = true; showStudentPage(name);
  } else {
    document.getElementById("lock-error").textContent = "Şifre yanlış, tekrar deneyin.";
    document.getElementById("pwd-input").value = "";
    document.getElementById("pwd-input").focus();
  }
}

function logout(name) { delete unlockedStudents[name]; showLockScreen(name); }

function showStudentPage(name) {
  const rows = allData.filter(r => r.ogrenci === name).sort((a,b) => a.tarih > b.tarih ? 1:-1);
  if (!rows.length) { document.getElementById("content").innerHTML = '<div class="empty">Veri yok.</div>'; return; }
  const latest = rows[rows.length-1];
  const initials = name.split(" ").map(w=>w[0]).join("").toUpperCase().slice(0,2);
  const s = esc(name);

  let pageContent = "";
  if (activePageTab === "ozet") pageContent = buildOzet(rows, latest, name);
  else if (activePageTab === "takvim") pageContent = buildTakvim(rows);
  else if (activePageTab === "haftalar") pageContent = buildHaftalar(rows);
  else if (activePageTab === "denemeler") pageContent = buildDenemeler(name);

  document.getElementById("content").innerHTML = `
    <div class="student-header">
      <div class="avatar">${initials}</div>
      <div class="student-info"><h2>${name}</h2><p>Son güncelleme: ${latest.tarih}</p></div>
      <div class="level-badge">${latest.seviye}</div>
      ${passwords[name] ? `<button class="logout-btn" onclick="logout('${s}')">🔒 Çıkış</button>` : ""}
    </div>
    <div class="page-tabs">
      <div class="page-tab${activePageTab==='ozet'?' active':''}" onclick="switchPageTab('${s}','ozet')">📊 Özet</div>
      <div class="page-tab${activePageTab==='takvim'?' active':''}" onclick="switchPageTab('${s}','takvim')">📅 Takvim</div>
      <div class="page-tab${activePageTab==='haftalar'?' active':''}" onclick="switchPageTab('${s}','haftalar')">📝 Haftalar</div>
      <div class="page-tab${activePageTab==='denemeler'?' active':''}" onclick="switchPageTab('${s}','denemeler')">📝 Denemeler</div>
    </div>
    ${pageContent}
  `;

  if (activePageTab === "ozet") drawCharts(rows);
  if (activePageTab === "denemeler") drawDenemeChart(name);
}

function switchPageTab(name, tab) {
  activePageTab = tab;
  showStudentPage(name);
}

function buildBadges(genel, prevGenel) {
  const earned = BADGES.filter(b => genel >= b.score);
  const earnedCount = earned.length;
  const total = BADGES.length;
  const pct = Math.round(earnedCount / total * 100);

  let notifHtml = "";
  if (prevGenel !== null && prevGenel !== undefined) {
    const prevEarned = BADGES.filter(b => prevGenel >= b.score);
    const newBadges = BADGES.filter(b => genel >= b.score && prevGenel < b.score);
    const lostBadges = BADGES.filter(b => genel < b.score && prevGenel >= b.score);

    if (newBadges.length > 0) {
      const names = newBadges.map(b => `${b.emoji} ${b.label}`).join(", ");
      notifHtml = `
        <div class="badge-notif gained">
          <div class="badge-notif-emoji">${newBadges[newBadges.length-1].emoji}</div>
          <div class="badge-notif-text">
            <h3>🎉 Yeni rozet kazandın!</h3>
            <p>Bu hafta harika bir performans! <strong>${names}</strong> rozeti ${newBadges.length > 1 ? 'rozetleri' : 'rozeti'} senin oldu. Böyle devam et!</p>
          </div>
        </div>`;
    } else if (lostBadges.length > 0) {
      const names = lostBadges.map(b => `${b.emoji} ${b.label}`).join(", ");
      notifHtml = `
        <div class="badge-notif lost">
          <div class="badge-notif-emoji">😔</div>
          <div class="badge-notif-text">
            <h3>Bu hafta biraz düşüş yaşandı</h3>
            <p>Maalesef <strong>${names}</strong> rozeti ${lostBadges.length > 1 ? 'rozetleri' : 'rozeti'} bu hafta elden gitti. Ama endişelenme, bir sonraki haftada geri alabilirsin!</p>
          </div>
        </div>`;
    }
  }

  const grid = BADGES.map(b => {
    const isEarned = genel >= b.score;
    return `
      <div class="badge-item ${isEarned ? 'earned' : 'locked'}">
        <div class="badge-emoji">${b.emoji}</div>
        <div class="badge-label">${b.label}</div>
        <div class="badge-score">${b.score} puan</div>
      </div>`;
  }).join("");

  return `
    ${notifHtml}
    <div class="badges-card">
      <div class="badges-title">🏅 Kazanılan Rozetler — ${earnedCount}/${total}</div>
      <div class="badges-grid">${grid}</div>
      <div class="badges-progress">
        <div class="badges-progress-bar"><div class="badges-progress-fill" style="width:${pct}%"></div></div>
        <div class="badges-progress-text">%${pct} tamamlandı</div>
      </div>
    </div>`;
}

/* ── ÖZET ── */
function buildOzet(rows, latest, studentName) {
  const scoredRows = rows.filter(r => r.genel > 0 || r.vocabulary > 0 || r.konusma > 0 || r.okuma > 0 || r.yazma > 0 || r.grammar > 0);
  const latestScored = scoredRows.length > 0 ? scoredRows[scoredRows.length-1] : latest;
  const prevScored   = scoredRows.length > 1 ? scoredRows[scoredRows.length-2] : null;
  
  latest = latestScored;
  const prev = prevScored;
  
  function delta(key) {
    if (!prev) return '<span class="same">—</span>';
    const d = latest[key]-prev[key];
    if (d>0) return `<span class="up">↑ ${d}</span>`;
    if (d<0) return `<span class="down">↓ ${Math.abs(d)}</span>`;
    return '<span class="same">→ sabit</span>';
  }
  const skills = ["vocabulary","konusma","okuma","yazma","grammar"];
  const skillRows = skills.map(sk => `
    <div class="skill-row">
      <div class="skill-header">
        <span class="skill-name">${SKILL_LABELS[sk]}</span>
        <span class="skill-score" style="color:${SKILL_COLORS[sk]}">${latest[sk]}/100</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" style="width:${latest[sk]}%;background:${SKILL_COLORS[sk]}"></div></div>
    </div>`).join("");

  const dersler = rows.filter(r=>r.ders_durumu);
  const yapildi = dersler.filter(r=>r.ders_durumu==="yapildi").length;
  const yapilmadi = dersler.filter(r=>r.ders_durumu==="yapilmadi").length;
  const ertelendi = dersler.filter(r=>r.ders_durumu==="ertelendi").length;

  const badgesHtml = buildBadges(latest.genel, prev ? prev.genel : null);

  // Dinamik Öğretmen Yorumu Üretimi
  const teacherComment = generateUniqueComment(latest.genel, studentName, latest);

  return `
    ${badgesHtml}
    
    <div class="teacher-feedback-card">
      <div class="feedback-header">
        <span class="feedback-animated-icon">✍️</span>
        <h4 class="feedback-title">Öğretmenin Haftalık Notu</h4>
      </div>
      <p class="feedback-text">"${teacherComment}"</p>
    </div>

    <div class="metrics-grid">
      <div class="metric-card"><div class="metric-label">Genel puan</div><div class="metric-value">${latest.genel}</div><div class="metric-delta">${delta("genel")}</div></div>
      <div class="metric-card"><div class="metric-label">Son deneme</div><div class="metric-value" id="son-deneme-val">—</div><div class="metric-delta" id="son-deneme-delta"></div></div>
      <div class="metric-card"><div class="metric-label">Toplam ders</div><div class="metric-value">${yapildi}</div><div class="metric-delta" style="color:#888">${dersler.length} planlı</div></div>
      <div class="metric-card"><div class="metric-label">Devam oranı</div><div class="metric-value">${dersler.length?Math.round(yapildi/dersler.length*100):0}%</div><div class="metric-delta"><span style="color:#e74c3c">${yapilmadi} kaçırıldı</span></div></div>
    </div>

    <div class="card">
      <div class="card-title">Genel gelişim grafiği</div>
      <canvas id="chartGenel"></canvas>
    </div>

    <div class="card">
      <div class="card-title">Beceri radar grafiği</div>
      <canvas id="chartRadar"></canvas>
    </div>

    <div class="card">
      <div class="card-title">Beceri alanları</div>
      ${skillRows}
    </div>
  `;
}

    new Chart(ctx1.getContext("2d"), {
      type: "line",

}

/* ── TAKVİM ── */
function buildTakvim(rows) {
  const dersMap = {};
  rows.forEach(r => {
    if (r.ders_tarihi) dersMap[r.ders_tarihi] = { durum: r.ders_durumu, konu: r.konu };
  });

  const monthsMap = {};
  Object.keys(dersMap).forEach(dtStr => {
    const parts = dtStr.split(".");
    if (parts.length === 3) {
      const mIdx = parseInt(parts[1], 10) - 1;
      const year = parseInt(parts[2], 10);
      const k = year + "-" + mIdx;
      if (!monthsMap[k]) monthsMap[k] = { year, mIdx, dates: [] };
      monthsMap[k].dates.push(dtStr);
    }
  });

  let keys = Object.keys(monthsMap).sort();
  if (!keys.length) {
    const d = new Date();
    const k = d.getFullYear() + "-" + d.getMonth();
    monthsMap[k] = { year: d.getFullYear(), mIdx: d.getMonth(), dates: [] };
    keys = [k];
  }

  return '<div class="calendar-wrap">' + keys.map((k, idx) => {
    const m = monthsMap[k];
    const isOpen = idx === keys.length - 1;
    
    const firstDay = new Date(m.year, m.mIdx, 1).getDay();
    const startDay = firstDay === 0 ? 6 : firstDay - 1;
    const daysInMonth = new Date(m.year, m.mIdx + 1, 0).getDate();
    
    let daysHtml = "";
    for (let i = 0; i < startDay; i++) daysHtml += '<div class="cal-day empty"></div>';
    
    const today = new Date();
    const isThisMonth = today.getFullYear() === m.year && today.getMonth() === m.mIdx;
    
    for (let d = 1; d <= daysInMonth; d++) {
      const dateStr = d.toString().padStart(2, '0') + "." + (m.mIdx + 1).toString().padStart(2, '0') + "." + m.year;
      const hasDers = dersMap[dateStr];
      let cls = "";
      if (hasDers) cls = " " + hasDers.durum;
      if (isThisMonth && today.getDate() === d) cls += " today";
      
      daysHtml += `
        <div class="cal-day${cls}" title="${hasDers ? hasDers.konu : ''}">
          <div class="day-num">${d}</div>
        </div>`;
    }
    
    return `
      <div class="cal-month">
        <div class="cal-month-title${isOpen?' open':''}" onclick="this.classList.toggle('open'); this.nextElementSibling.classList.toggle('open')">
          <span>${TR_MONTHS[m.mIdx]} ${m.year}</span>
          <span class="cal-arrow">▼</span>
        </div>
        <div class="cal-month-body${isOpen?' open':''}">
          <div class="cal-grid" style="background:#fff; border-bottom:1px solid #f0f0f0;">
            ${TR_DAYS.map(dName => `<div class="cal-day-name">${dName}</div>`).join("")}
          </div>
          <div class="cal-grid">${daysHtml}</div>
          <div class="cal-legend">
            <div class="cal-legend-item"><div class="cal-legend-dot" style="background:#1D9E75"></div>Yapıldı</div>
            <div class="cal-legend-item"><div class="cal-legend-dot" style="background:#e74c3c"></div>Yapılmadı</div>
            <div class="cal-legend-item"><div class="cal-legend-dot" style="background:#f39c12"></div>Ertelendi</div>
            <div class="cal-legend-item"><div class="cal-legend-dot" style="background:#378ADD"></div>Sonraki Ders</div>
          </div>
        </div>
      </div>`;
  }).join("") + '</div>';
}

/* ── HAFTALAR ── */
function buildHaftalar(rows) {
  const scoredRows = rows.filter(r => r.genel > 0 || r.vocabulary > 0 || r.konusma > 0 || r.okuma > 0 || r.yazma > 0 || r.grammar > 0);
  if (!scoredRows.length) return '<div class="empty">Haftalık detay bulunamadı.</div>';
  
  if (activeWeekIndex >= scoredRows.length) activeWeekIndex = scoredRows.length - 1;
  const currentWeek = scoredRows[scoredRows.length - 1 - activeWeekIndex];
  
  const tabsHtml = scoredRows.map((r, idx) => {
    const revIdx = scoredRows.length - 1 - idx;
    return `<div class="week-tab${revIdx === activeWeekIndex ? ' active' : ''}" onclick="activeWeekIndex=${revIdx}; showStudentPage('${esc(activeStudent)}')">${r.tarih}</div>`;
  }).reverse().join("");

  const st = currentWeek.ders_durumu || "sonraki";
  const statusLabels = { yapildi: "Yapıldı", yapilmadi: "Yapılmadı", ertelendi: "Ertelendi", sonraki: "Planlandı" };

  return `
    <div class="week-tabs">${tabsHtml}</div>
    <div class="week-card">
      <div class="week-card-header">
        <div class="week-card-title">${currentWeek.tarih} Raporu</div>
        <div class="week-status ${st}">${statusLabels[st] || st}</div>
      </div>
      <div class="week-body">
        <div class="week-row"><div class="week-row-label">İşlenen Konu</div><div class="week-row-value">${currentWeek.konu || "Belirtilmemiş"}</div></div>
        <div class="week-row"><div class="week-row-label">Ödev Durumu</div><div class="week-row-value">${currentWeek.odev_durumu || "Belirtilmemiş"}</div></div>
        <div class="week-scores">
          <div class="week-score-item"><span class="week-score-label">Genel Başarı Puanı</span><span class="week-score-val" style="color:#1D9E75">${currentWeek.genel}</span></div>
          <div class="week-score-item"><span class="week-score-label">Vocabulary</span><span class="week-score-val">${currentWeek.vocabulary}</span></div>
          <div class="week-score-item"><span class="week-score-label">Konuşma</span><span class="week-score-val">${currentWeek.konusma}</span></div>
          <div class="week-score-item"><span class="week-score-label">Okuma</span><span class="week-score-val">${currentWeek.okuma}</span></div>
          <div class="week-score-item"><span class="week-score-label">Yazma</span><span class="week-score-val">${currentWeek.yazma}</span></div>
          <div class="week-score-item"><span class="week-score-label">Grammar</span><span class="week-score-val">${currentWeek.grammar}</span></div>
        </div>
      </div>
    </div>`;
}

/* ── DENEMELER ── */
function buildDenemeler(name) {
  const sData = denemelerData.filter(r => r.ogrenci === name);
  if (!sData.length) return '<div class="empty">Henüz deneme sınavı verisi girilmemiş.</div>';
  
  setTimeout(() => {
    const rows = allData.filter(r => r.ogrenci === name).sort((a,b) => a.tarih > b.tarih ? 1:-1);
    const scoredRows = rows.filter(r => r.genel > 0 || r.vocabulary > 0 || r.konusma > 0 || r.okuma > 0 || r.yazma > 0 || r.grammar > 0);
    const latest = scoredRows.length > 0 ? scoredRows[scoredRows.length-1] : rows[rows.length-1];
    const prev = scoredRows.length > 1 ? scoredRows[scoredRows.length-2] : null;

    const el = document.getElementById("son-deneme-val");
    const dl = document.getElementById("son-deneme-delta");
    if (el) el.textContent = sData[sData.length-1].puan;
    if (dl && prev) {
      const pD = denemelerData.filter(r => r.ogrenci === name && r.tarih === prev.tarih);
      if (pD.length) {
        const d = sData[sData.length-1].puan - pD[pD.length-1].puan;
        if (d>0) dl.innerHTML = `<span class="up">↑ ${d}</span>`;
        else if (d<0) dl.innerHTML = `<span class="down">↓ ${Math.abs(d)}</span>`;
        else dl.innerHTML = '<span class="same">→ sabit</span>';
      } else { dl.innerHTML = '<span class="same">—</span>'; }
    }
  }, 50);

  const tableRows = sData.map((r, idx) => {
    const t = examTag(r.puan);
    return `<tr><td>${r.tarih}</td><td><b>${r.deneme_adi}</b></td><td>${r.puan}</td><td><span class="tag ${t.cls}">${t.lbl}</span></td></tr>`;
  }).reverse().join("");

  return `
    <div class="card"><div class="card-title">Deneme Sınavları Grafik İvmesi</div><canvas id="chartDenemelerTab"></canvas></div>
    <div class="card" style="padding:10px;"><table class="exam-table"><thead><tr><th>Tarih</th><th>Deneme Adı</th><th>Puan</th><th>Durum</th></tr></thead><tbody>${tableRows}</tbody></table></div>`;
}

function drawDenemeChart(name) {
  const sData = denemelerData.filter(r => r.ogrenci === name);
  const ctx = document.getElementById("chartDenemelerTab");
  if (!ctx || !sData.length) return;
  
  new Chart(ctx.getContext("2d"), {
    type: "line",
    data: {
      labels: sData.map(r => r.tarih),
      datasets: [{
        label: "Deneme Puanı",
        data: sData.map(r => r.puan),
        borderColor: "#378ADD",
        backgroundColor: "rgba(55,140,221,0.08)",
        tension: 0.2, pointRadius: 5, fill: true, pointBackgroundColor: "#378ADD"
      }]
    },
    options: {
      responsive: true,
      plugins: { legend: { display: false } },
      scales: {
        y: { min: 0, max: 100, grid: { color: "#f0f0f0" } },
        x: { grid: { display: false } }
      }
    }
  });
}
</script>
