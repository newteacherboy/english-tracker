<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Öğrenci Takip Sistemi</title>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f4f6f8; color: #1a1a1a; min-height: 100vh; }

/* ANA SAYFA */
.home { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem; }
.home-logo { font-size: 22px; font-weight: 700; color: #1a1a1a; margin-bottom: 0.4rem; text-align: center; }
.home-logo span { color: #1D9E75; }
.home-sub { font-size: 14px; color: #888; margin-bottom: 3rem; text-align: center; }
.home-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; width: 100%; max-width: 480px; }
.home-card { background: #fff; border: 1px solid #e8eaed; border-radius: 18px; padding: 2rem 1.5rem; text-align: center; cursor: pointer; transition: all 0.18s; }
.home-card:hover { border-color: #1D9E75; box-shadow: 0 4px 20px rgba(29,158,117,0.12); transform: translateY(-2px); }
.home-card .icon { font-size: 36px; margin-bottom: 0.8rem; }
.home-card h2 { font-size: 15px; font-weight: 600; color: #1a1a1a; margin-bottom: 0.4rem; line-height: 1.3; }
.home-card p { font-size: 12px; color: #aaa; }
.contact-btns { display: flex; gap: 10px; margin-top: 2rem; }
.contact-btn { display: flex; align-items: center; gap: 8px; padding: 10px 20px; border-radius: 999px; font-size: 13px; font-weight: 600; text-decoration: none; transition: opacity 0.15s; }
.contact-btn.mail { background: #f0f4ff; color: #2952cc; }
.contact-btn.whatsapp { background: #e8f8ef; color: #128C7E; }
@media (max-width: 400px) { .home-cards { grid-template-columns: 1fr; } }

/* TRACKER */
.tracker { display: none; flex-direction: column; min-height: 100vh; }
.header { background: #fff; border-bottom: 1px solid #e8eaed; padding: 0.9rem 1.25rem; display: flex; align-items: center; gap: 10px; position: sticky; top: 0; z-index: 20; }
.back-btn { background: none; border: 1px solid #e8eaed; border-radius: 999px; padding: 5px 12px; font-size: 12px; color: #555; cursor: pointer; white-space: nowrap; }
.back-btn:hover { background: #f4f6f8; }
.header-title { font-size: 15px; font-weight: 600; flex: 1; }
.header-title span { color: #1D9E75; }
.last-updated { font-size: 11px; color: #aaa; }
.student-tabs { display: flex; gap: 8px; padding: 1rem 1.25rem 0; overflow-x: auto; background: #fff; border-bottom: 1px solid #e8eaed; padding-bottom: 1rem; }
.tab { padding: 7px 16px; border-radius: 999px; font-size: 13px; font-weight: 500; cursor: pointer; border: 1.5px solid #e8eaed; background: #f4f6f8; color: #555; white-space: nowrap; transition: all 0.15s; }
.tab.active { background: #1D9E75; color: #fff; border-color: #1D9E75; }

/* KİLİT */
.lock-screen { background: #fff; border-radius: 16px; border: 1px solid #e8eaed; padding: 2.5rem 1.5rem; text-align: center; margin: 1.5rem; }
.lock-icon { font-size: 40px; margin-bottom: 1rem; }
.lock-screen h3 { font-size: 16px; font-weight: 600; margin-bottom: 0.4rem; }
.lock-screen p { font-size: 13px; color: #888; margin-bottom: 1.5rem; }
.lock-input { width: 100%; max-width: 260px; padding: 10px 14px; border: 1.5px solid #e8eaed; border-radius: 10px; font-size: 15px; text-align: center; outline: none; letter-spacing: 2px; margin-bottom: 12px; display: block; margin-left: auto; margin-right: auto; }
.lock-input:focus { border-color: #1D9E75; }
.lock-btn { background: #1D9E75; color: #fff; border: none; border-radius: 10px; padding: 10px 32px; font-size: 14px; font-weight: 600; cursor: pointer; width: 100%; max-width: 260px; }
.lock-error { color: #c0392b; font-size: 13px; margin-top: 10px; min-height: 18px; }

/* ÖĞRENCİ DETAY */
.student-page { display: none; }
.student-page.active { display: block; }
.student-header { background: #fff; border-radius: 14px; padding: 1.25rem; margin-bottom: 1rem; display: flex; align-items: center; gap: 14px; border: 1px solid #e8eaed; }
.avatar { width: 48px; height: 48px; border-radius: 50%; background: #9FE1CB; display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 600; color: #085041; flex-shrink: 0; }
.student-info h2 { font-size: 16px; font-weight: 600; margin-bottom: 3px; }
.student-info p { font-size: 13px; color: #666; }
.level-badge { margin-left: auto; background: #E1F5EE; color: #0F6E56; border-radius: 999px; padding: 4px 12px; font-size: 12px; font-weight: 600; white-space: nowrap; }
.logout-btn { margin-left: 8px; background: none; border: 1px solid #e8eaed; border-radius: 999px; padding: 4px 10px; font-size: 11px; color: #888; cursor: pointer; white-space: nowrap; }

/* SAYFA SEKMELERİ */
.page-tabs { display: flex; gap: 0; margin-bottom: 1.25rem; background: #fff; border-radius: 12px; border: 1px solid #e8eaed; overflow: hidden; }
.page-tab { flex: 1; padding: 10px 8px; text-align: center; font-size: 13px; font-weight: 500; cursor: pointer; color: #888; border-right: 1px solid #e8eaed; transition: all 0.15s; }
.page-tab:last-child { border-right: none; }
.page-tab.active { background: #1D9E75; color: #fff; font-weight: 600; }

/* ÖZET SAYFA */
.metrics-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 1rem; }
.metric-card { background: #fff; border-radius: 12px; padding: 14px; border: 1px solid #e8eaed; }
.metric-label { font-size: 11px; color: #888; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.04em; }
.metric-value { font-size: 26px; font-weight: 700; color: #1a1a1a; line-height: 1; }
.metric-delta { font-size: 12px; margin-top: 4px; }
.up { color: #0F6E56; } .down { color: #c0392b; } .same { color: #888; }
.card { background: #fff; border-radius: 14px; padding: 1.25rem; margin-bottom: 1rem; border: 1px solid #e8eaed; }
.card-title { font-size: 13px; font-weight: 600; color: #333; margin-bottom: 1rem; }
.skill-row { margin-bottom: 12px; }
.skill-header { display: flex; justify-content: space-between; margin-bottom: 5px; }
.skill-name { font-size: 13px; color: #555; }
.skill-score { font-size: 13px; font-weight: 600; }
.progress-bar { height: 8px; background: #f0f0f0; border-radius: 999px; overflow: hidden; }
.progress-fill { height: 100%; border-radius: 999px; transition: width 0.8s ease; }

/* TAKVİM */
.calendar-wrap { margin-bottom: 1rem; }
.cal-month { background: #fff; border-radius: 14px; border: 1px solid #e8eaed; overflow: hidden; margin-bottom: 10px; }
.cal-month-title { font-size: 13px; font-weight: 600; color: #333; padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; user-select: none; }
.cal-month-title:hover { background: #f8fffe; }
.cal-month-title .cal-arrow { font-size: 11px; color: #aaa; transition: transform 0.2s; }
.cal-month-title.open .cal-arrow { transform: rotate(180deg); }
.cal-month-body { display: none; }
.cal-month-body.open { display: block; }
.cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 0; }
.cal-day-name { text-align: center; font-size: 10px; color: #aaa; padding: 8px 0; font-weight: 500; }
