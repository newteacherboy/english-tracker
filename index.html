<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#1D9E75">
<title>English Progress Tracker</title>
<link rel="manifest" href="manifest.json">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f4f6f8; color: #1a1a1a; min-height: 100vh; }

  .header { background: #fff; border-bottom: 1px solid #e8eaed; padding: 1rem 1.5rem; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 10; }
  .logo { font-size: 17px; font-weight: 600; color: #1a1a1a; }
  .logo span { color: #1D9E75; }

  .student-tabs { display: flex; gap: 8px; padding: 1rem 1.5rem 0; overflow-x: auto; }
  .tab { padding: 8px 18px; border-radius: 999px; font-size: 13px; font-weight: 500; cursor: pointer; border: 1.5px solid #e8eaed; background: #fff; color: #555; white-space: nowrap; transition: all 0.15s; }
  .tab.active { background: #1D9E75; color: #fff; border-color: #1D9E75; }

  .content { padding: 1.25rem 1.5rem; max-width: 720px; margin: 0 auto; }

  .student-header { background: #fff; border-radius: 14px; padding: 1.25rem; margin-bottom: 1rem; display: flex; align-items: center; gap: 14px; border: 1px solid #e8eaed; }
  .avatar { width: 48px; height: 48px; border-radius: 50%; background: #9FE1CB; display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 600; color: #085041; flex-shrink: 0; }
  .student-info h2 { font-size: 16px; font-weight: 600; margin-bottom: 3px; }
  .student-info p { font-size: 13px; color: #666; }
  .level-badge { margin-left: auto; background: #E1F5EE; color: #0F6E56; border-radius: 999px; padding: 4px 12px; font-size: 12px; font-weight: 600; }

  .metrics-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; margin-bottom: 1rem; }
  .metric-card { background: #fff; border-radius: 12px; padding: 14px; border: 1px solid #e8eaed; }
  .metric-label { font-size: 11px; color: #888; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.04em; }
  .metric-value { font-size: 26px; font-weight: 700; color: #1a1a1a; line-height: 1; }
  .metric-delta { font-size: 12px; margin-top: 4px; }
  .up { color: #0F6E56; } .down { color: #c0392b; } .same { color: #888; }

  .card { background: #fff; border-radius: 14px; padding: 1.25rem; margin-bottom: 1rem; border: 1px solid #e8eaed; }
  .card-title { font-size: 13px; font-weight: 600; color: #333; margin-bottom: 1rem; }

  .skill-row { margin-bottom: 12px; }
  .skill-header { display: flex; justify-content: space-between; margin-bottom: 5px; }
  .skill-name { font-size: 13px; color: #555; }
  .skill-score { font-size: 13px; font-weight: 600; color: #1a1a1a; }
  .progress-bar { height: 7px; background: #f0f0f0; border-radius: 999px; overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 999px; transition: width 0.6s ease; }

  .exam-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .exam-table th { color: #888; font-weight: 500; text-align: left; padding: 6px 8px; border-bottom: 1px solid #f0f0f0; font-size: 11px; text-transform: uppercase; }
  .exam-table td { padding: 9px 8px; border-bottom: 1px solid #f8f8f8; color: #333; }
  .tag { display: inline-block; font-size: 10px; padding: 2px 8px; border-radius: 999px; font-weight: 600; }
  .tag-green { background: #E1F5EE; color: #0F6E56; }
  .tag-amber { background: #FAEEDA; color: #854F0B; }
  .tag-blue  { background: #E6F1FB; color: #185FA5; }

  .note-box { background: #f8fffe; border-left: 3px solid #1D9E75; border-radius: 0 10px 10px 0; padding: 12px 16px; font-size: 13px; color: #444; line-height: 1.6; }
  .note-box strong { color: #1a1a1a; }

  .empty { text-align: center; padding: 3rem 1rem; color: #aaa; font-size: 14px; }
  .loading { text-align: center; padding: 3rem; color: #888; font-size: 14px; }

  canvas { max-height: 180px; }

  @media (max-width: 500px) {
    .header { padding: 0.9rem 1rem; }
    .content { padding: 1rem; }
    .student-tabs { padding: 1rem 1rem 0; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="logo">English<span>Progress</span></div>
  <div style="font-size:12px;color:#aaa;" id="last-updated"></div>
</div>

<div class="student-tabs" id="tabs"></div>

<div class="content" id="content">
  <div class="loading">Veriler yükleniyor...</div>
</div>

<script>
const SHEET_ID = "19kAcNuSVjbP_XODmFOj4uCQQ8JYxZ7IQSrw5KLwqKLY";
const SHEET_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json`;

const SKILL_COLORS = {
  vocabulary: "#1D9E75",
  konusma:    "#378ADD",
  okuma:      "#7F77DD",
  yazma:      "#EF9F27",
  grammar:    "#D85A30"
};

let allData = [];
let students = [];
let activeStudent = null;

async function loadData() {
  try {
    const res = await fetch(SHEET_URL);
    const text = await res.text();
    const json = JSON.parse(text.match(/google\.visualization\.Query\.setResponse\(([\s\S\w]+)\)/)[1]);
    const rows = json.table.rows;

    allData = rows.slice(1).map(r => {
      const c = r.c;
      return {
        tarih:      c[0]?.v || "",
        ogrenci:    c[1]?.v || "",
        seviye:     c[2]?.v || "",
        genel:      Number(c[3]?.v) || 0,
        vocabulary: Number(c[4]?.v) || 0,
        konusma:    Number(c[5]?.v) || 0,
        okuma:      Number(c[6]?.v) || 0,
        yazma:      Number(c[7]?.v) || 0,
        grammar:    Number(c[8]?.v) || 0,
        deneme:     Number(c[9]?.v) || 0,
        not:        c[10]?.v || ""
      };
    }).filter(r => r.ogrenci);

    students = [...new Set(allData.map(r => r.ogrenci))];
    document.getElementById("last-updated").textContent = "Güncellendi: " + new Date().toLocaleTimeString("tr-TR", {hour:"2-digit",minute:"2-digit"});
    renderTabs();
    if (students.length) selectStudent(students[0]);
  } catch(e) {
    document.getElementById("content").innerHTML = '<div class="empty">Veri yüklenemedi. Sheets paylaşım ayarını kontrol et.</div>';
  }
}

function renderTabs() {
  const el = document.getElementById("tabs");
  el.innerHTML = students.map(s =>
    `<div class="tab${s===activeStudent?' active':''}" onclick="selectStudent('${s}')">${s.split(" ")[0]}</div>`
  ).join("");
}

function selectStudent(name) {
  activeStudent = name;
  renderTabs();
  const rows = allData.filter(r => r.ogrenci === name).sort((a,b) => a.tarih > b.tarih ? 1 : -1);
  if (!rows.length) { document.getElementById("content").innerHTML = '<div class="empty">Bu öğrenciye ait veri yok.</div>'; return; }

  const latest = rows[rows.length - 1];
  const prev   = rows.length > 1 ? rows[rows.length - 2] : null;

  function delta(key) {
    if (!prev) return '<span class="same">—</span>';
    const d = latest[key] - prev[key];
    if (d > 0) return `<span class="up">↑ ${d}</span>`;
    if (d < 0) return `<span class="down">↓ ${Math.abs(d)}</span>`;
    return '<span class="same">→ sabit</span>';
  }

  function examTag(score) {
    if (score >= 80) return '<span class="tag tag-green">İyi</span>';
    if (score >= 65) return '<span class="tag tag-amber">Gelişiyor</span>';
    return '<span class="tag tag-blue">Başlangıç</span>';
  }

  const initials = name.split(" ").map(w=>w[0]).join("").toUpperCase().slice(0,2);

  const examRows = rows.filter(r => r.deneme > 0).slice(-5).reverse().map(r =>
    `<tr><td>${r.tarih}</td><td>Deneme</td><td><strong>${r.deneme}</strong></td><td>${examTag(r.deneme)}</td></tr>`
  ).join("") || `<tr><td colspan="4" style="color:#aaa;text-align:center;padding:1rem">Henüz deneme sonucu yok</td></tr>`;

  const skills = ["vocabulary","konusma","okuma","yazma","grammar"];
  const skillLabels = {vocabulary:"Vocabulary",konusma:"Konuşma",okuma:"Okuma",yazma:"Yazma",grammar:"Grammar"};

  const skillRows = skills.map(s => `
    <div class="skill-row">
      <div class="skill-header"><span class="skill-name">${skillLabels[s]}</span><span class="skill-score">${latest[s]}/100</span></div>
      <div class="progress-bar"><div class="progress-fill" style="width:${latest[s]}%;background:${SKILL_COLORS[s]}"></div></div>
    </div>`).join("");

  const chartLabels = rows.slice(-8).map(r => r.tarih);
  const chartGenel  = rows.slice(-8).map(r => r.genel);
  const chartDeneme = rows.slice(-8).map(r => r.deneme || null);

  document.getElementById("content").innerHTML = `
    <div class="student-header">
      <div class="avatar">${initials}</div>
      <div class="student-info">
        <h2>${name}</h2>
        <p>Son güncelleme: ${latest.tarih}</p>
      </div>
      <div class="level-badge">${latest.seviye}</div>
    </div>

    <div class="metrics-grid">
      <div class="metric-card"><div class="metric-label">Genel puan</div><div class="metric-value">${latest.genel}</div><div class="metric-delta">${delta("genel")}</div></div>
      <div class="metric-card"><div class="metric-label">Vocabulary</div><div class="metric-value">${latest.vocabulary}</div><div class="metric-delta">${delta("vocabulary")}</div></div>
      <div class="metric-card"><div class="metric-label">Grammar</div><div class="metric-value">${latest.grammar}</div><div class="metric-delta">${delta("grammar")}</div></div>
      <div class="metric-card"><div class="metric-label">Son deneme</div><div class="metric-value">${latest.deneme || "—"}</div><div class="metric-delta">${latest.deneme ? delta("deneme") : ""}</div></div>
    </div>

    <div class="card">
      <div class="card-title">Son 8 hafta gelişim</div>
      <canvas id="progressChart"></canvas>
    </div>

    <div class="card">
      <div class="card-title">Beceri alanları — son hafta</div>
      ${skillRows}
    </div>

    <div class="card">
      <div class="card-title">Deneme sonuçları</div>
      <table class="exam-table">
        <thead><tr><th>Tarih</th><th>Tür</th><th>Puan</th><th>Durum</th></tr></thead>
        <tbody>${examRows}</tbody>
      </table>
    </div>

    ${latest.not ? `<div class="note-box"><strong>Öğretmen notu:</strong> ${latest.not}</div>` : ""}
  `;

  // Chart
  const ctx = document.getElementById("progressChart").getContext("2d");
  new Chart(ctx, {
    type: "line",
    data: {
      labels: chartLabels,
      datasets: [
        { label: "Genel puan", data: chartGenel, borderColor: "#1D9E75", backgroundColor: "rgba(29,158,117,0.08)", tension: 0.3, pointRadius: 4, fill: true },
        { label: "Deneme", data: chartDeneme, borderColor: "#378ADD", backgroundColor: "transparent", tension: 0.3, pointRadius: 4, borderDash: [5,3] }
      ]
    },
    options: {
      responsive: true,
      plugins: { legend: { labels: { font: { size: 12 }, boxWidth: 12 } } },
      scales: {
        y: { min: 0, max: 100, ticks: { font: { size: 11 } }, grid: { color: "#f0f0f0" } },
        x: { ticks: { font: { size: 10 } }, grid: { display: false } }
      }
    }
  });
}

loadData();
setInterval(loadData, 5 * 60 * 1000); // 5 dakikada bir otomatik yenile
</script>
</body>
</html>
