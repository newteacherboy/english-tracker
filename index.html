<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f4f6f8; color: #1a1a1a; min-height: 100vh; }

/* ANA SAYFA */
.home { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem; }
.home-logo { font-size: 22px; font-weight: 700; color: #1a1a1a; margin-bottom: 0.4rem; text-align: center; }
.home-logo span { color: #1D9E75; }
.home-sub { font-size: 14px; color: #888; margin-bottom: 3rem; text-align: center; }
.home-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; width: 100%; max-width: 480px; }
.home-card { background: #fff; border: 1px solid #e8eaed; border-radius: 18px; padding: 2rem 1.5rem; text-align: center; cursor: pointer; transition: all 0.18s; }
.home-card:hover { border-color: #1D9E75; box-shadow: 0 4px 20px rgba(29,158,117,0.12); transform: translateY(-2px); }
.home-card .icon { font-size: 36px; margin-bottom: 0.8rem; }
.home-card h2 { font-size: 15px; font-weight: 600; color: #1a1a1a; margin-bottom: 0.4rem; line-height: 1.3; }
.home-card p { font-size: 12px; color: #aaa; }
.contact-btns { display: flex; gap: 10px; margin-top: 2rem; }
.contact-btn { display: flex; align-items: center; gap: 8px; padding: 10px 20px; border-radius: 999px; font-size: 13px; font-weight: 600; text-decoration: none; transition: opacity 0.15s; }
.contact-btn.mail { background: #f0f4ff; color: #2952cc; }
.contact-btn.whatsapp { background: #e8f8ef; color: #128C7E; }

/* YENİ ÜÇERLİ RENKLİ DİKDÖRTGEN ÖĞRENCİ ALANI */

.student-grid-centered { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; width: 100%; max-width: 500px; margin: 0 auto; }
.student-rect-btn { 
  display: flex; flex-direction: column; align-items: center; justify-content: center; 
  height: 90px; border-radius: 12px; border: none; cursor: pointer; 
  transition: all 0.2s ease; text-align: center; padding: 10px 4px; position: relative; color: white; 
}
.student-rect-btn:hover { transform: translateY(-3px); box-shadow: 0 6px 15px rgba(0,0,0,0.15); }
.student-rect-avatar { 
  font-size: 16px; font-weight: 800; background: rgba(255, 255, 255, 0.25); 
  width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; 
  margin-bottom: 6px; text-transform: uppercase; text-shadow: 0 1px 2px rgba(0,0,0,0.1); 
}
.student-rect-name { font-size: 11.5px; font-weight: 700; width: 100%; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; padding: 0 2px; text-shadow: 0 1px 2px rgba(0,0,0,0.15); }
.lock-badge { position: absolute; top: 5px; right: 6px; font-size: 11px; background: rgba(0,0,0,0.15); padding: 2px; border-radius: 50%; line-height: 1; }

/* TRACKER */

.header { background: #fff; border-bottom: 1px solid #e8eaed; padding: 0.9rem 1.25rem; display: flex; align-items: center; gap: 10px; position: sticky; top: 0; z-index: 20; }
.back-btn { background: none; border: 1px solid #e8eaed; border-radius: 999px; padding: 5px 12px; font-size: 12px; color: #555; cursor: pointer; white-space: nowrap; }

.last-updated { font-size: 11px; color: #aaa; }
.student-tabs { display: none; gap: 8px; padding: 1rem 1.25rem 0; overflow-x: auto; background: #fff; border-bottom: 1px solid #e8eaed; padding-bottom: 1rem; }

/* KİLİT */
.lock-screen { background: #fff; border-radius: 16px; border: 1px solid #e8eaed; padding: 2.5rem 1.5rem; text-align: center; margin: 1.5rem auto; max-width: 400px; width: 100%; }

.lock-screen p { font-size: 13px; color: #888; margin-bottom: 1.5rem; }

.lock-input:focus { border-color: #1D9E75; }
.lock-btn { background: #1D9E75; color: #fff; border: none; border-radius: 10px; padding: 10px 32px; font-size: 14px; font-weight: 600; cursor: pointer; width: 100%; max-width: 260px; }
.lock-error { color: #c0392b; font-size: 13px; margin-top: 10px; min-height: 18px; }

.logout-btn { margin-left: 8px; background: none; border: 1px solid #e8eaed; border-radius: 999px; padding: 4px 10px; font-size: 11px; color: #888; cursor: pointer; white-space: nowrap; }

/* DERS TARİHLERİ KUTUCUĞU CSS */

.badge-yapilmadi { background: #fdecea; color: #c0392b; border: 1px solid #f5b4b0; }
.badge-ertelendi { background: #FFF5E6; color: #D35400; border: 1px solid #F39C12; }
.badge-sonraki { background: #E6F1FB; color: #185FA5; border: 1px solid #378ADD; }

/* ÖZET SAYFA */

.metric-delta { font-size: 12px; margin-top: 4px; }
.up { color: #0F6E56; } .down { color: #c0392b; } .same { color: #888; }
.card { background: #fff; border-radius: 14px; padding: 1.25rem; margin-bottom: 1rem; border: 1px solid #e8eaed; }
.card-title { font-size: 13px; font-weight: 600; color: #333; margin-bottom: 1rem; }
.skill-row { margin-bottom: 12px; }
.skill-header { display: flex; justify-content: space-between; margin-bottom: 5px; }
.skill-name { font-size: 13px; color: #555; }
.skill-score { font-size: 13px; font-weight: 600; }
.progress-bar { height: 8px; background: #f0f0f0; border-radius: 999px; overflow: hidden; }
.progress-fill { height: 100%; border-radius: 999px; transition: width 0.8s ease; }

/* DERS SEKMELERİ (AKORDEON ARAYÜZÜ) */
.lesson-accordion-item { background: #fff; border: 1px solid #e8eaed; border-radius: 12px; margin-bottom: 10px; overflow: hidden; box-shadow: 0 2px 6px rgba(0,0,0,0.02); transition: all 0.2s; }
.lesson-accordion-header { width: 100%; display: flex; justify-content: space-between; align-items: center; padding: 14px 16px; background: #fff; border: none; font-size: 14px; font-weight: 600; color: #1a1a1a; cursor: pointer; text-align: left; outline: none; }
.lesson-accordion-header:hover { background: #f8f9fa; }
.lesson-header-left { display: flex; align-items: center; gap: 10px; }
.lesson-header-right { display: flex; align-items: center; gap: 12px; }
.lesson-accordion-arrow { font-size: 11px; color: #aaa; transition: transform 0.2s; }
.lesson-accordion-item.open .lesson-accordion-arrow { transform: rotate(180deg); }
.lesson-accordion-content { display: none; padding: 16px; background: #fff; border-top: 1px solid #f0f0f0; }
.lesson-accordion-item.open .lesson-accordion-content { display: block; }
.week-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 13px; border-bottom: 1px dashed #f0f0f0; padding-bottom: 6px; }
.week-row-label { color: #666; }
.week-row-value { color: #1a1a1a; }
.week-scores { display: flex; flex-wrap: wrap; gap: 6px; }
.week-score-item { background: #f4f6f8; border-radius: 6px; padding: 4px 8px; font-size: 11px; }
.week-score-label { color: #777; margin-right: 4px; }
.week-score-val { font-weight: 600; color: #1D9E75; }

/* DENEME */
.exam-table { width: 100%; border-collapse: collapse; font-size: 13px; }

.exam-table td { padding: 9px 8px; border-bottom: 1px solid #f8f8f8; color: #333; }
.tag { display: inline-block; font-size: 10px; padding: 2px 8px; border-radius: 999px; font-weight: 600; }
.tag-green { background: #E1F5EE; color: #0F6E56; }

.tag-amber { background: #FAEEDA; color: #854F0B; }

.content { padding: 1.25rem; max-width: 720px; margin: 0 auto; }
.empty { text-align: center; padding: 3rem 1rem; color: #aaa; font-size: 14px; }
.loading { text-align: center; padding: 3rem; color: #888; font-size: 14px; }
canvas { max-height: 200px; }

/* ROZET BİLDİRİMİ */
.badge-notif { border-radius: 14px; padding: 1rem 1.25rem; margin-bottom: 1rem; display: flex; align-items: center; gap: 14px; }
.badge-notif.gained { background: linear-gradient(135deg, #e8f8ef, #d0f0e0); border: 1px solid #a8dfc0; }
.badge-notif.lost { background: linear-gradient(135deg, #fdecea, #fad4d1); border: 1px solid #f5b4b0; }
.badge-notif-emoji { font-size: 36px; flex-shrink: 0; }
.badge-notif-text h3 { font-size: 14px; font-weight: 700; margin-bottom: 3px; }
.badge-notif.gained h3 { color: #0a5c38; }
.badge-notif.lost h3 { color: #8b1a14; }
.badge-notif-text p { font-size: 12px; color: #555; line-height: 1.4; }

/* ROZETLER */
.badges-card { background: #fff; border-radius: 14px; border: 1px solid #e8eaed; padding: 1.25rem; margin-bottom: 1rem; }
.badges-title { font-size: 13px; font-weight: 600; color: #333; margin-bottom: 1rem; }
.badges-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; }
.badge-item { display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 8px 4px; border-radius: 10px; }
.badge-item.earned { background: #f8fffe; border: 1px solid #c8edd8; }
.badge-item.locked { opacity: 0.25; filter: grayscale(1); }
.badge-emoji { font-size: 24px; line-height: 1; }
.badge-label { font-size: 9px; font-weight: 600; color: #555; text-align: center; }
.badge-score { font-size: 9px; color: #aaa; }
.badges-progress { margin-top: 12px; display: flex; align-items: center; gap: 10px; }
.badges-progress-bar { flex: 1; height: 6px; background: #f0f0f0; border-radius: 999px; overflow: hidden; }
.badges-progress-fill { height: 100%; background: linear-gradient(90deg, #f39c12, #1D9E75); border-radius: 999px; transition: width 0.8s ease; }
.badges-progress-text { font-size: 11px; color: #888; white-space: nowrap; }

/* CSS ANİMASYONLU ÖĞRETMEN NOTU KARTI */
.teacher-feedback-card { position: relative; background: #fff; border-radius: 16px; padding: 1.5rem; margin-bottom: 1.5rem; overflow: hidden; border: 1px solid #e2e8f0; box-shadow: 0 4px 15px rgba(0, 0, 0, 0.02); }
.teacher-feedback-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 5px; background: linear-gradient(90deg, #1D9E75, #378ADD, #f39c12, #1D9E75); background-size: 300% 100%; animation: borderGlow 6s linear infinite; }
.feedback-header { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
.feedback-title { font-size: 14px; font-weight: 700; color: #0f172a; letter-spacing: 0.02em; }
.feedback-text { font-size: 13.5px; line-height: 1.6; color: #334155; font-style: italic; position: relative; z-index: 2; padding-left: 5px; }
.feedback-animated-icon { font-size: 18px; animation: writeAnimation 1.5s ease-in-out infinite alternate; display: inline-block; }
@keyframes borderGlow { 0% { background-position: 0% 50%; } 100% { background-position: 100% 50%; } }
@keyframes writeAnimation { 0% { transform: translate(0, 0) rotate(0deg); } 100% { transform: translate(3px, -3px) rotate(15deg); } }
</style>

<script>
const SHEET_ID = "19kAcNuSVjbP_XODmFOj4uCQQ8JYxZ7IQSrw5KLwqKLY";
const SECTIONS = {
  ingilizce: { gid: "0",         label: "📚 İngilizce Özel Ders" },
  kocluk:    { gid: "770963286", label: "🎯 Eğitim Koçum" }
};
const DENEMELER_GID = "969516335";
const SKILL_COLORS = { vocabulary: "#1D9E75", konusma: "#378ADD", okuma: "#7F77DD", yazma: "#EF9F27", grammar: "#D85A30" };
const SKILL_LABELS = { vocabulary:"Vocabulary", konusma:"Konuşma", okuma:"Okuma", yazma:"Yazma", grammar:"Grammar" };

// Göz alıcı ve dikkat çeken canlı kutucuk renkleri havuzu
const BRIGHT_COLORS = [
  "linear-gradient(135deg, #FF512F, #DD2476)", 
  "linear-gradient(135deg, #1D9E75, #11694E)", 
  "linear-gradient(135deg, #00c6ff, #0072ff)", 
  "linear-gradient(135deg, #f857a6, #ff5858)", 
  "linear-gradient(135deg, #f12711, #f5af19)", 
  "linear-gradient(135deg, #4776E6, #8E54E9)", 
  "linear-gradient(135deg, #11998e, #38ef7d)", 
  "linear-gradient(135deg, #FF416C, #FF4B2B)", 
  "linear-gradient(135deg, #3a7bd5, #3a6073)"
];

let currentSection = null;
let allData = [];
let students = [];
let passwords = {};
let unlockedStudents = {};
let activeStudent = null;
let activePageTab = "ozet";
let denemelerData = [];

const parseDateStr = (dStr) => {
  if (!dStr) return new Date(0);
  const parts = dStr.split(".");
  return new Date(parts[2], parts[1] - 1, parts[0]);
};

/* 🧠 GELİŞMİŞ ÖĞRETMEN YORUM MOTORU 🧠 */
function generateUniqueComment(puan, studentName, latestRow, allRows) {
  const firstName = studentName.split(" ")[0];
  const odev = (latestRow.odev_durumu || "").toLowerCase();
  const r = (arr) => arr[Math.floor(Math.random() * arr.length)];

  let girisCumlesi = "";
  if (puan >= 0 && puan <= 25) {
    const havuz = [
      `Bu hafta ${firstName} ile henüz motorları ısıtma ve birbirimizi tanıma evresindeyiz. Mevcut puanımız yanıltıcı olmasın; amacımız eksikleri görüp tam da buradan yukarı fırlamak! 🚀`,
      `${firstName} için bu haftaki tablo, gerçek potansiyelimizin sadece küçük bir uykuda olma hali. Biz bu filmin sonunu biliyoruz, eksiklerimizi tek tek avlayıp çok yakında harika bir ivme yakalayacağız. 💪`,
      `İlk adımlar her zaman sabır ister. ${firstName} bu hafta enerjisini topladı diyebiliriz; önümüzdeki günlerde bu temelin üzerine koyacağımız tuğlaları planladık, veli olarak hiç endişeniz olmasın. ✨`
    ];
    girisCumlesi = r(havuz);
  } else if (puan > 25 && puan <= 50) {
    const havuz = [
      `${firstName} bu hafta çarkları döndürmeye ve gelişim sinyalleri vermeye başladı. Taşlar yerine oturuyor, gayretini çok net görebiliyorum. 📈`,
      `Güzel bir kımıldanma ve çaba haftasındayız! ${firstName} bazı duvarları yıkmaya başladı. Eksiklerimiz var ama yürüyüşümüz kararlı. 👣`,
      `Yetersiz kaldığımız noktalar elbette mevcut ancak ${firstName}'deki o öğrenme isteği ve tatlı gelişim kıvılcımı bu hafta kendini hissettirdi. ⚡`
    ];
    girisCumlesi = r(havuz);
  } else if (puan > 50 && puan <= 75) {
    const havuz = [
      `Gayet iyi, dengeli ve bizi mutlu eden bir haftayı geride bıraktık. ${firstName} standardını koruyor ama bizim gözümüz çok daha yükseklerde! 🌟`,
      `${firstName} bu hafta sorumluluklarını güzel yerine getirdi ve iyi bir düzey yakaladı. Şimdi hedefimiz bu başarıyı 'en iyisi' yapmak için cilalamak. 💎`,
      `Çok net bir 'iyi düzey' performance eseri izledik. ${firstName} potansiyelinin büyük kısmını sahaya yansıttı, ufak dokunuşlarla zirveye oynayacağız. 🎯`
    ];
    girisCumlesi = r(havuz);
  } else if (puan > 75 && puan <= 100) {
    const havuz = [
      `Kelimelerin tam anlamıyla harika, muazzam bir hafta! ${firstName} bu hafta adeta sınıfta devleşti, gurur duymamak elde değil! 🔥`,
      `Muhteşem bir disiplin ve kusursuz bir performans tablosu! ${firstName} çıtayı öyle bir yere koydu ki, ders yaparken keyif almamak imkansız. 👑`,
      `Harika iş çıkardık! ${firstName} bu haftanın yıldızı olmayı sonuna kadar hak etti. Emeklerinin karşılığını böyle almak paha biçilemez. 🌠`
    ];
    girisCumlesi = r(havuz);
  }

  let haftalikKiyaslama = "";
  const studentRows = allRows
    .filter(r => r.ogrenci === studentName && (r.genel > 0 || r.vocabulary > 0))
    .sort((a, b) => parseDateStr(a.tarih) - parseDateStr(b.tarih));
  if (studentRows.length > 1) {
    const currentIdx = studentRows.findIndex(r => r.tarih === latestRow.tarih);
    if (currentIdx > 0) {
      const prevRow = studentRows[currentIdx - 1];
      const fark = Math.round(puan - prevRow.genel);
      if (fark > 0) {
        haftalikKiyaslama = ` Geçen haftaki puanına göre genel performansını **+${fark} puan** daha artırarak yukarı yönlü harika bir sıçrama gerçekleştirdi; bu yükseliş grafiği inancımızı tazeledi. 🚀`;
      } else if (fark < 0) {
        haftalikKiyaslama = ` Geçen haftaki puanına oranla bu hafta **${fark} puanlık** ufak bir durulma/gerileme söz konusu. Ancak bu düşüşü bir geri çekilme değil, önümüzdeki hafta daha güçlü zıplamak için bir yaylanma hareketi olarak görüyoruz. 🔋`;
      } else {
        haftalikKiyaslama = ` Geçen haftaki çizgimizi ve istikrarımızı tam puanı puanına koruduk. Mevcut durumu sabitlemek güzel ama bir sonraki hafta hedefimiz bu çizgiyi yukarı kırmak olacak. 🎯`;
      }
    }
  }

  let taktikNotu = "";
  if (odev.includes("yapılmadı") || odev.includes("yok")) {
    const eksikHavuzu = [
      ` Önümüzdeki süreçte ivme yakalayabilmemiz için ödev disiplinini acilen birinci sıraya koymalıyız. Unutmayalım ki derste öğrenilenler sadece birer tohumdur; onları kalıcı başarıya dönüştürecek olan şey evde yapılacak düzenli test çözümleri ve soru avcılığıdır.`,
      ` Bu performansın kalıcı bir başarı hikayesine dönüşmesi için ödevlerin eksiksiz yapılması şart. Velimiz olarak sizden ricam, evde ders sonrası mini tekrarlar yapmasını teşvik etmeniz; zira sıcağı sıcağına yapılmayan tekrarlar bilginin hızla uçup gitmesine neden olur.`,
      ` Önümüzdeki hafta tempomuzu artırmak adına ödev sorumluluklarına sıkı sıkıya sarılmalıyız. Sadece ders saatiyle sınırlı kalmayıp, her gün mutlaka en az 15-20 dakikalık odaklanmış test çözümü ve hatalı soru analizi rutini oluşturmasını tavsiye ediyorum.`
    ];
    taktikNotu = r(eksikHavuzu);
  } else {
    const basariHavuzu = [
      ` Sürecimizi daha da yukarı taşımak adına şu stratejik taktiği uygulamalıyız: Her akşam yatmadan önce mutlaka 10 dakikalık bir "kelime tekrarı" rutini oturtalım. Görsel hafızayı canlı tutmak, denemelerdeki yeni nesil soruları çok daha hızlı analiz etmesini sağlayacaktır.`,
      ` Yakaladığımız bu güzel ritmi korumak adına yeni taktiğimiz şu olmalı: Öğrencimiz çözdüğü testlerde sadece doğrularına odaklanmamalı; boş bıraktığı veya yanlış yaptığı soruları kesip bir "hata defteri" yapmalı. Gerçek gelişim, yapamadığımız soruları çözebildiğimiz an başlar.`,
      ` Sürecin daha sağlıklı ilerlemesi için bir sonraki adımımız ders sonrası mini özet çıkarma alışkanlığı olmalı. Konu anlatımı biter bitmez kendi cümleleriyle tutacağı küçük notlar ve ardından gelecek soru çözümleri, bilgiyi zihninde tamamen kilitleyecektir.`
    ];
    taktikNotu = r(basariHavuzu);
  }

  return `${girisCumlesi}${haftalikKiyaslama}${taktikNotu}`;
}

function examTag(puan) {
  if (puan > 85) return { cls: 'tag-green',  lbl: 'Muhteşemsin!' };
  if (puan > 70) return { cls: 'tag-teal',   lbl: 'Böyle Devam' };
  if (puan > 50) return { cls: 'tag-amber',  lbl: 'Yükselişte' };
  return              { cls: 'tag-blue',   lbl: 'Gelişiyor' };
}

function parseCSV(text) {
  const lines = text.trim().split("\n");
  return lines.map(line => {
    const cols = []; let cur = "", inQ = false;
    for (let i = 0; i < line.length; i++) {
      const ch = line[i];
      if (ch === '"') { inQ = !inQ; }
      else if (ch === ',' && !inQ) { cols.push(cur.trim()); cur = ""; }
      else { cur += ch; }
    }
    cols.push(cur.trim());
    return cols;
  });
}

function openSection(section) {
  currentSection = section;
  allData = []; students = []; passwords = {}; unlockedStudents = {}; activeStudent = null;
  document.getElementById("home").style.display = "none";

function backToMainMenu() {
  activeStudent = null;
  currentSection = null;
  document.getElementById("tracker").style.display = "none";
  document.getElementById("home").style.display = "flex";
}

async function loadData() {
  const gid = SECTIONS[currentSection].gid;
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&gid=${gid}&t=${Date.now()}`;
  try {
    const res = await fetch(url);
    if (!res.ok) throw new Error("HTTP " + res.status);
    const text = await res.text();
    const rows = parseCSV(text);
    function toNum(v) { return parseFloat((v||"").toString().replace(",",".")) || 0; }
    
    allData = rows.slice(1).map(r => ({
      tarih: r[0] || "", ogrenci: r[1] || "", seviye: r[2] || "", genel: toNum(r[3]),
      vocabulary: toNum(r[4]), konusma: toNum(r[5]), okuma: toNum(r[6]), yazma: toNum(r[7]),
      grammar: toNum(r[8]), deneme: toNum(r[9]), sifre: r[10] ? r[10].trim() : "",
      ders_tarihi: r[11] || "", ders_durumu: r[12] ? r[12].trim() : "",
      odev_durumu: r[13] ? r[13].trim() : "", konu: r[14] || ""
    })).filter(r => r.ogrenci);

    passwords = {};
    allData.forEach(r => { if (r.sifre) passwords[r.ogrenci] = r.sifre; });
    students = [...new Set(allData.map(r => r.ogrenci))];

    try {
      const dUrl = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&gid=${DENEMELER_GID}&t=${Date.now()}`;
      const dRes = await fetch(dUrl); const dText = await dRes.text(); const dRows = parseCSV(dText);
      denemelerData = dRows.slice(1).map(r => ({ tarih: r[0] || "", ogrenci: r[1] || "", deneme_adi: r[2] || "", puan: toNum(r[3]) })).filter(r => r.ogrenci && r.puan > 0);
    } catch(e) { denemelerData = []; }

    document.getElementById("last-updated").textContent = new Date().toLocaleTimeString("tr-TR", {hour:"2-digit",minute:"2-digit"});
    
    if (students.length) {
      renderCenteredStudentSelection();
    } else {
      document.getElementById("content").innerHTML = '<div class="empty">Henüz öğrenci eklenmemiş.</div>';
    }
  } catch(e) {
    console.error(e);
    document.getElementById("content").innerHTML = `<div class="empty">Hata: ${e.message}</div>`;
  }
}

        ${lockIcon}

function esc(s) { return s.replace(/\\/g,"\\\\").replace(/'/g,"\\'"); }

function selectStudent(name) {
  activeStudent = name;
  if (passwords[name] && !unlockedStudents[name]) {
    renderLockScreen(name);
    return;
  }
  showStudentData(name);
}

function renderLockScreen(name) {
  document.getElementById("tabs").style.display = "none";
  document.getElementById("content").innerHTML = `
    <div class="lock-screen">
      <div class="lock-icon">🔒</div>
      <h3>Öğrenci Paneli Kilitli</h3>
      <p><b>${name}</b> verilerine erişmek için lütfen şifreyi girin.</p>
      <input type="password" class="lock-input" id="pinput" placeholder="••••" maxlength="10">
      <button class="lock-btn" onclick="checkPassword('${esc(name)}')">Giriş Yap</button>
      <div class="lock-error" id="lerr"></div>
    </div>`;
  setTimeout(() => {
    const input = document.getElementById("pinput");
    if(input) {
      input.focus();
      input.addEventListener("keypress", (e) => { if(e.key === "Enter") checkPassword(name); });
    }
  }, 100);
}

function checkPassword(name) {
  const input = document.getElementById("pinput");
  const err = document.getElementById("lerr");
  if (!input || !err) return;
  if (input.value === passwords[name]) {
    unlockedStudents[name] = true;
    showStudentData(name);
  } else {
    err.textContent = "Hatalı şifre! Lütfen tekrar deneyin.";
    input.value = ""; input.focus();
  }
}

function showStudentData(name) {
  document.getElementById("header-title").innerHTML = `${SECTIONS[currentSection].label} ❯ <span>${name}</span>`;
  renderPage(name);
}

function changePageTab(tabName, studentName) {
  activePageTab = tabName;
  renderPage(studentName);
}

function renderPage(name) {
  const sData = allData.filter(r => r.ogrenci === name).sort((a, b) => parseDateStr(a.tarih) - parseDateStr(b.tarih));
  if (!sData.length) {
    document.getElementById("content").innerHTML = '<div class="empty">Bu öğrenciye ait veri bulunamadı.</div>';
    return;
  }
  const latest = sData[sData.length - 1];

  let mainHtml = `
    <div class="student-header">
      <div class="avatar">${name.split(" ").map(w=>w[0]).join("").toUpperCase().slice(0,2)}</div>
      <div class="student-info">
        <h2>${name}</h2>
        <p>${latest.tarih} itibarıyla</p>
      </div>
      ${latest.seviye ? `<div class="level-badge">${latest.seviye}</div>` : ''}
      ${passwords[name] ? `<button class="logout-btn" onclick="delete unlockedStudents['${esc(name)}']; loadData();">🔒 Kilitle</button>` : ''}
    </div>
    
    <div class="page-tabs">
      <div class="page-tab${activePageTab==='ozet'?' active':''}" onclick="changePageTab('ozet', '${esc(name)}')">Özet</div>
      <div class="page-tab${activePageTab==='dersler'?' active':''}" onclick="changePageTab('dersler', '${esc(name)}')">Ders Konuları</div>
      <div class="page-tab${activePageTab==='denemeler'?' active':''}" onclick="changePageTab('denemeler', '${esc(name)}')">Denemeler</div>
    </div>
  `;

  if (activePageTab === "ozet") mainHtml += buildOzetTab(latest, sData, name);
  else if (activePageTab === "dersler") mainHtml += buildDerslerTab(sData);
  else if (activePageTab === "denemeler") mainHtml += buildDenemelerTab(name);

  document.getElementById("content").innerHTML = mainHtml;

  if (activePageTab === "ozet") {
    setTimeout(() => {
      sData.forEach(row => {
        const skills = ['vocabulary', 'konusma', 'okuma', 'yazma', 'grammar'];
        skills.forEach(s => {
          const fill = document.getElementById(`fill-${row.tarih}-${s}`);
          if (fill) fill.style.width = fill.getAttribute('data-w') + '%';
        });
      });
      const bFill = document.getElementById("badges-fill-bar");
      if(bFill) bFill.style.width = bFill.getAttribute('data-w') + '%';
    }, 100);
  } else if (activePageTab === "denemeler") {
    setTimeout(() => { drawDenemeChart(name); }, 100);
  }
}

function buildOzetTab(latest, sData, studentName) {
  let deltaHtml = "";
  if (sData.length > 1) {
    const prev = sData[sData.length - 2];
    const diff = Math.round(latest.genel - prev.genel);
    if (diff > 0) deltaHtml = `<span class="metric-delta up">▲ +${diff} puan</span>`;
    else if (diff < 0) deltaHtml = `<span class="metric-delta down">▼ ${diff} puan</span>`;
    else deltaHtml = `<span class="metric-delta same">→ sabit</span>`;
  } else { deltaHtml = `<span class="metric-delta same">—</span>`; }

  let statusGridHtml = "";
  const validStatusRows = sData.filter(r => r.ders_tarihi && r.ders_durumu);
  if(validStatusRows.length > 0) {
    const sRows = validStatusRows.slice(-3);
    statusGridHtml = sRows.map(r => {
      const cls = r.ders_durumu.toLowerCase().replace(/ı/g,'i').replace(/ğ/g,'g').replace(/ş/g,'s').replace(/ç/g,'c').replace(/ö/g,'o').replace(/ü/g,'u');
      return `<div class="status-element"><span class="lbl">${r.tarih}</span><span class="date">${r.ders_tarihi}</span><span class="status-badge badge-${cls}">${r.ders_durumu}</span></div>`;
    }).join("");
  } else {
    statusGridHtml = `<div class="status-empty">Henüz ders takvimi kaydı bulunmuyor.</div>`;
  }

  const currentBadges = [];
  const achievedInLatest = [];
  const lostInLatest = [];
  const sDataSorted = [...sData].sort((a,b)=>parseDateStr(a.tarih)-parseDateStr(b.tarih));
  
  const badgeConfig = [
    { id:"v1", emoji:"🌱", label:"Kelime Avcısı", desc:"Vocabulary puanı 70'i geçti!", check: r => r.vocabulary >= 70 },
    { id:"v2", emoji:"🌳", label:"Sözlük Üstadı", desc:"Vocabulary puanı 90'ı geçti!", check: r => r.vocabulary >= 90 },
    { id:"g1", emoji:"📐", label:"Kural Tanıyan", desc:"Grammar puanı 75'i geçti!", check: r => r.grammar >= 75 },
    { id:"g2", emoji:"🏛️", label:"Grammar Profesörü", desc:"Grammar puanı 92'yi geçti!", check: r => r.grammar >= 92 },
    { id:"d1", emoji:"📈", label:"İlk Başarı", desc:"Genel performans puanı 60'ı geçti!", check: r => r.genel >= 60 },
    { id:"d2", emoji:"🚀", label:"Zirve Yolcusu", desc:"Genel performans puanı 80'i geçti!", check: r => r.genel >= 80 },
    { id:"d3", emoji:"👑", label:"Efsane", desc:"Genel performans puanı 95 and üzeri!", check: r => r.genel >= 95 },
    { id:"ex", emoji:"💯", label:"Sınav Canavarı", desc:"Deneme sınavlarından 85 ve üzeri!", check: r => r.deneme >= 85 }
  ];

  let prevBadges = [];
  sDataSorted.forEach((row, index) => {
    const rowBadges = [];
    badgeConfig.forEach(b => { if(b.check(row)) rowBadges.push(b.id); });
    if (index === sDataSorted.length - 1) {
      badgeConfig.forEach(b => {
        const isEarned = rowBadges.includes(b.id);
        const wasEarned = prevBadges.includes(b.id);
        currentBadges.push({ ...b, earned: isEarned });
        if(isEarned && !wasEarned) achievedInLatest.push(b);
        if(!isEarned && wasEarned) lostInLatest.push(b);
      });
    }
    prevBadges = rowBadges;
  });

  if(currentBadges.length === 0) {
    badgeConfig.forEach(b => { currentBadges.push({ ...b, earned: false }); });
  }

  let notifHtml = "";
  if(achievedInLatest.length > 0) {
    const b = achievedInLatest[achievedInLatest.length - 1];
    notifHtml = `<div class="badge-notif gained"><div class="badge-notif-emoji">${b.emoji}</div><div class="badge-notif-text"><h3>Yeni Rozet Kazandın!</h3><p><b>${b.label}</b> rozeti portföyüne eklendi: ${b.desc}</p></div></div>`;
  } else if(lostInLatest.length > 0) {
    const b = lostInLatest[lostInLatest.length - 1];
    notifHtml = `<div class="badge-notif lost"><div class="badge-notif-emoji">⚠️</div><div class="badge-notif-text"><h3>Rozet Kaybedildi</h3><p>Performans düşüşü nedeniyle <b>${b.label}</b> rozeti geçici olarak kilitlendi. Yeniden kazanmak senin elinde!</p></div></div>`;
  }

  const earnedCount = currentBadges.filter(b=>b.earned).length;
  const progressPercent = Math.round((earnedCount / badgeConfig.length) * 100);

  const badgesGridHtml = currentBadges.map(b => `<div class="badge-item ${b.earned?'earned':'locked'}"><div class="badge-emoji">${b.emoji}</div><div class="badge-label">${b.label}</div></div>`).join("");

  const uniqueComment = generateUniqueComment(latest.genel, studentName, latest, sData);

  return `
    ${notifHtml}
    <div class="metrics-grid">
      <div class="metric-card"><div class="metric-label">Performans İndeksi</div><div class="metric-value">${Math.round(latest.genel)}</div>${deltaHtml}</div>
      <div class="metric-card"><div class="metric-label">Son Deneme</div><div class="metric-value">${latest.deneme > 0 ? Math.round(latest.deneme) : '—'}</div><span class="metric-delta same">LGS Formatlı</span></div>
    </div>

    <div class="teacher-feedback-card">
      <div class="feedback-header"><span class="feedback-title">🎯 Öğretmen Değerlendirmesi</span> <span class="feedback-animated-icon">✍️</span></div>
      <div class="feedback-text">${uniqueComment}</div>
    </div>

    <div class="lesson-status-box">
      <div class="status-box-title">📅 Özel Ders Takvimi & Durumu</div>
      <div class="status-grid">${statusGridHtml}</div>
    </div>

    <div class="badges-card">
      <div class="badges-title">🏆 Gelişim Rozetleri Kapısı</div>
      <div class="badges-grid">${badgesGridHtml}</div>
      <div class="badges-progress">
        <div class="badges-progress-bar"><div class="badges-progress-fill" id="badges-fill-bar" data-w="${progressPercent}"></div></div>
        <div class="badges-progress-text">%${progressPercent} Tamamlandı</div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">Haftalık Beceri Dağılım Analizi (${latest.tarih})</div>
      ${['vocabulary', 'konusma', 'okuma', 'yazma', 'grammar'].map(s => {
        const val = latest[s];
        return `
          <div class="skill-row">
            <div class="skill-header"><span class="skill-name">${SKILL_LABELS[s]}</span><span class="skill-score">${val} / 100</span></div>
            <div class="progress-bar"><div class="progress-fill" id="fill-${latest.tarih}-${s}" data-w="${val}" style="background:${SKILL_COLORS[s]}"></div></div>
          </div>`;
      }).join("")}
    </div>
  `;
}

function buildDerslerTab(sData) {
  const validRows = sData.filter(r => r.konu || r.ders_durumu || r.odev_durumu).reverse();
  if (!validRows.length) return '<div class="empty">Henüz işlenen ders konusu kaydı bulunmuyor.</div>';

  return validRows.map((r, idx) => {
    const isFirst = idx === 0;
    return `
      <div class="lesson-accordion-item ${isFirst ? 'open' : ''}" id="acc-item-${idx}">
        <button class="lesson-accordion-header" onclick="toggleAccordion(${idx})">
          <div class="lesson-header-left">📅 <b>${r.tarih}</b></div>
          <div class="lesson-header-right">
            <span class="tag ${r.ders_durumu==='Tamamlandı'?'tag-green':'tag-amber'}">${r.ders_durumu || 'Belirsiz'}</span>
            <span class="lesson-accordion-arrow">▼</span>
          </div>
        </button>
        <div class="lesson-accordion-content">
          <div class="week-row"><span class="week-row-label">📚 İşlenen Konu/Detay:</span><span class="week-row-value"><b>${r.konu || 'Belirtilmedi'}</b></span></div>
          <div class="week-row"><span class="week-row-label">📝 Ödev Sorumluluğu:</span><span class="week-row-value">${r.odev_durumu || 'Verilmedi'}</span></div>
          <div class="week-row" style="border:none; padding:0; margin-top:12px;"><span class="week-row-label" style="margin-bottom:6px; display:block;">📊 Bu Dersin Skor Grafiği:</span></div>
          <div class="week-scores">
            <div class="week-score-item"><span class="week-score-label">Vocab:</span><span class="week-score-val">${r.vocabulary}</span></div>
            <div class="week-score-item"><span class="week-score-label">Grammar:</span><span class="week-score-val">${r.grammar}</span></div>
            <div class="week-score-item"><span class="week-score-label">Okuma:</span><span class="week-score-val">${r.okuma}</span></div>
            <div class="week-score-item"><span class="week-score-label">Genel:</span><span class="week-score-val" style="color:#333">${r.genel}</span></div>
          </div>
        </div>
      </div>`;
  }).join("");
}

function toggleAccordion(idx) {
  const item = document.getElementById(`acc-item-${idx}`);
  if(item) item.classList.toggle('open');
}

function buildDenemelerTab(name) {
  const sData = denemelerData.filter(r => r.ogrenci === name).sort((a,b)=>parseDateStr(a.tarih)-parseDateStr(b.tarih));
  if (!sData.length) return '<div class="empty">Bu öğrenciye ait deneme sınavı sonucu bulunamadı.</div>';

  setTimeout(() => {
    const dl = document.getElementById("deneme-trend-lbl");
    if(dl && sData.length > 1) {
      const last = sData[sData.length - 1].puan;
      const prev = sData[sData.length - 2].puan;
      const diff = Math.round(last - prev);
      if(diff > 0) dl.innerHTML = `<span class="up">▲ +${diff} puan artış</span>`;
      else if(diff < 0) dl.innerHTML = `<span class="down">▼ ${Math.abs(diff)} puan düşüş</span>`;
      else dl.innerHTML = '<span class="same">→ sabit</span>';
    }
  }, 50);

  const tableRows = [...sData].reverse().map(r => {
    const t = examTag(r.puan);
    return `<tr><td>${r.tarih}</td><td><b>${r.deneme_adi}</b></td><td>${r.puan}</td><td><span class=\"tag ${t.cls}\">${t.lbl}</span></td></tr>`;
  }).join("");

  return `
    <div class="card">
      <div class="card-title" style="display:flex; justify-content: space-between; align-items:center;">
        <span>Deneme Sınavları Grafik İvmesi</span>
        <span id="deneme-trend-lbl" style="font-size:11px; font-weight:normal; margin-left:auto;"></span>
      </div>
      <canvas id="chartDenemelerTab"></canvas>
    </div>
    <div class="card" style="padding:10px;"><table class=\"exam-table\"><thead><tr><th>Tarih</th><th>Deneme Adı</th><th>Puan</th><th>Durum</th></tr></thead><tbody>${tableRows}</tbody></table></div>`;
}

function drawDenemeChart(name) {
  const sData = denemelerData.filter(r => r.ogrenci === name).sort((a,b)=>parseDateStr(a.tarih)-parseDateStr(b.tarih));
  const ctx = document.getElementById("chartDenemelerTab");
  if (!ctx || !sData.length) return;
  
  new Chart(ctx.getContext("2d"), {
    type: "line",
    data: {
      labels: sData.map(r => r.tarih),
      datasets: [{
        label: "Deneme Puanı",
        data: sData.map(r => r.puan),
        borderColor: "#1D9E75",
        backgroundColor: "rgba(29, 158, 117, 0.05)",
        borderWidth: 2.5,
        tension: 0.3,
        fill: true,
        pointBackgroundColor: "#1D9E75",
        pointRadius: 4
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        y: { min: 0, max: 100, grid: { color: "#f0f0f0" }, ticks: { font: { size: 10 } } },
        x: { grid: { display: false }, ticks: { font: { size: 10 } } }
      }
    }
  });
}
</script>
</body>
</html>
